<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trippy</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f0f0ee;
    --cb: #ffffff;
    --hov: #e8e8e6;
    --bdr: #c8c8c4;
    --bdr2: #a0a09c;
    --ct: #111110;
    --cm: #6a6a66;
    --acc: #1a1a18;
    --acct: #ffffff;
    --inp: #ffffff;
    --inpb: #a0a09c;
    --inpt: #111110;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ct);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }

  .app { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* ── INPUTS ── */
  input, select, textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--inp);
    color: var(--inpt);
    border: 1.5px solid var(--inpb);
    border-radius: 8px;
    padding: 9px 11px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--acc); }
  input::placeholder { color: var(--cm); opacity: 0.8; }
  select option { background: var(--inp); color: var(--inpt); }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 15px;
    border-radius: 8px;
    border: 1.5px solid var(--bdr2);
    background: var(--cb);
    color: var(--ct);
    cursor: pointer;
    transition: background 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--hov); }
  .btn-p {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 15px;
    border-radius: 8px;
    border: none;
    background: var(--acc);
    color: var(--acct);
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn-p:hover { opacity: 0.85; }
  .btn-icon {
    width: 32px; height: 32px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 7px;
    border: 1.5px solid var(--bdr2);
    background: var(--cb);
    color: var(--ct);
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.1s;
  }
  .btn-icon:hover { background: var(--hov); }
  .btn-icon svg { pointer-events: none; }

  /* ── CARDS ── */
  .card {
    background: var(--cb);
    border: 1.5px solid var(--bdr);
    border-radius: 14px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .sec-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--cm);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 1rem;
  }
  .divider { height: 1.5px; background: var(--bdr); margin: 12px 0; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .empty { color: var(--cm); font-size: 13px; text-align: center; padding: 1.5rem 0; }

  /* ── NAV ── */
  .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .nav-card {
    background: var(--cb);
    border: 1.5px solid var(--bdr);
    border-radius: 14px;
    padding: 1.25rem;
    cursor: pointer;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    width: 100%;
    transition: background 0.1s, border-color 0.1s;
  }
  .nav-card:hover { background: var(--hov); border-color: var(--bdr2); }
  .nav-card.soon { opacity: .35; cursor: default; pointer-events: none; }
  .nav-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
  }

  /* ── TABS / SPLIT TOGGLE ── */
  .tab-bar {
    display: flex; gap: 4px; margin-bottom: 1rem;
    background: var(--hov); padding: 4px; border-radius: 9px;
    border: 1.5px solid var(--bdr);
  }
  .tab-btn {
    flex: 1; padding: 7px; text-align: center; font-size: 13px;
    cursor: pointer; border-radius: 6px; border: 1.5px solid transparent;
    background: none; color: var(--cm);
    font-family: 'DM Sans', sans-serif; font-weight: 400;
    transition: none;
  }
  .tab-btn.active {
    background: var(--cb); border-color: var(--bdr2);
    color: var(--ct); font-weight: 500;
  }
  .split-tog {
    display: flex; gap: 4px; margin-bottom: 12px;
    background: var(--hov); padding: 3px; border-radius: 8px;
    border: 1.5px solid var(--bdr);
  }
  .sopt {
    flex: 1; font-size: 12px; padding: 8px 4px; cursor: pointer;
    border-radius: 5px; border: 1.5px solid transparent;
    background: none; color: var(--cm);
    font-family: 'DM Sans', sans-serif;
  }
  .sopt.active {
    background: var(--cb); border-color: var(--bdr2);
    color: var(--ct); font-weight: 500;
  }

  /* ── PILLS / TAGS ── */
  .pill-a {
    font-size: 12px; padding: 5px 12px; border-radius: 20px;
    border: none; background: var(--acc); color: var(--acct);
    cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500;
  }
  .pill-i {
    font-size: 12px; padding: 5px 12px; border-radius: 20px;
    border: 1.5px solid var(--bdr2); background: var(--cb); color: var(--ct);
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--hov); border: 1.5px solid var(--bdr);
    border-radius: 20px; padding: 4px 10px; font-size: 13px; color: var(--ct);
  }
  .tag button {
    background: none; border: none; cursor: pointer;
    color: var(--cm); font-size: 14px; line-height: 1; padding: 0;
  }

  /* ── STAT CARDS ── */
  .stat-box {
    background: var(--hov); border: 1.5px solid var(--bdr);
    border-radius: 9px; padding: 10px 13px; flex: 1;
  }
  .stat-label { font-size: 10px; color: var(--cm); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
  .stat-val { font-size: 19px; font-weight: 500; color: var(--ct); white-space: nowrap; }

  /* ── EXPENSE CARDS ── */
  .exp-card {
    background: var(--cb); border: 1.5px solid var(--bdr);
    border-radius: 9px; padding: 12px 14px; margin-bottom: 8px;
  }
  .exp-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .exp-pill {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: var(--hov); color: var(--cm); border: 1px solid var(--bdr);
    font-family: 'DM Mono', monospace;
  }

  /* ── BALANCE CARDS ── */
  .bal-card {
    background: var(--cb); border: 1.5px solid var(--bdr);
    border-radius: 9px; padding: 12px 16px; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .bal-amt { font-size: 17px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }

  /* ── DRAWER ── */
  .drawer-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45); z-index: 50;
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: -310px; width: 290px;
    height: 100%; z-index: 51; transition: right .22s cubic-bezier(.4,0,.2,1);
    overflow-y: auto; background: var(--cb);
  }
  .drawer.open { right: 0; }
  .drawer-inner {
    background: var(--cb); border-left: 2px solid var(--bdr2);
    min-height: 100%; padding: 1.5rem 1.25rem 3rem;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 60;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--cb); border: 2px solid var(--bdr2);
    border-radius: 16px; padding: 1.5rem;
    width: 92%; max-width: 420px; max-height: 88vh; overflow-y: auto;
  }

  /* ── PACK ITEMS ── */
  .pack-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 0; border-bottom: 1.5px solid var(--bdr); font-size: 14px;
  }
  .pack-item:last-child { border-bottom: none; }
  .pack-item input[type=checkbox] {
    width: 16px; height: 16px; flex-shrink: 0; cursor: pointer;
    accent-color: var(--acc); width: auto;
  }
  .prog-bar-wrap {
    height: 5px; border-radius: 3px; background: var(--hov);
    border: 1px solid var(--bdr); overflow: hidden; margin-bottom: 8px;
  }
  .prog-bar { height: 100%; border-radius: 3px; background: var(--acc); transition: width .3s; }

  /* ── TRIP LIST ── */
  .trip-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-radius: 9px; cursor: pointer;
    margin-bottom: 4px; border: 1.5px solid transparent;
    transition: background 0.1s;
  }
  .trip-item.active { border-color: var(--acc); background: var(--acc); }
  .trip-item:not(.active) { background: var(--hov); border-color: var(--bdr); }
  .trip-item:not(.active):hover { border-color: var(--bdr2); }

  /* ── THEME GRID ── */
  .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .theme-btn {
    border-radius: 10px; padding: 10px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    text-align: left; border: 2px solid transparent;
  }
  .theme-btn.active { border-color: var(--acc); }
  .theme-swatch {
    height: 24px; border-radius: 5px; display: flex; gap: 4px;
    padding: 4px; margin-bottom: 6px;
    border: 1px solid rgba(128,128,128,.18);
  }
  .swatch-dot { width: 12px; height: 12px; border-radius: 50%; }

  /* ── BACK BUTTON ── */
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--cm); cursor: pointer; margin-bottom: 1rem; padding: 0;
  }
  .back-btn:hover { color: var(--ct); }

  /* ── CAT LABEL ── */
  .cat-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .1em; color: var(--cm); margin: 14px 0 4px;
  }

  /* ── PERSON PICKER ── */
  .person-picker-wrap {
    flex: 1; display: flex; flex-wrap: wrap; gap: 4px;
    padding: 7px 10px; background: var(--inp);
    border: 1.5px solid var(--inpb); border-radius: 8px;
    min-height: 38px; cursor: pointer;
  }

  .hidden { display: none !important; }

  /* Map stop drag animation */
  .stop-drag-handle { touch-action: none; cursor: grab; }
  .stop-drag-handle:active { cursor: grabbing; }
  .stop-row-dragging { opacity: 0.4; background: var(--hov); border-radius: 8px; }
  .stop-row-drag-over { border-top: 2.5px solid var(--acc) !important; }
  @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .stop-row-animate { animation: slideIn 0.2s ease; }

  /* ── MAP ── */
  #map-container { height: 400px; border-radius: 12px; overflow: hidden; border: 1.5px solid var(--bdr); margin-bottom: 1rem; position: relative; z-index: 1; }
  .leaflet-container { height: 100%; width: 100%; }
  .leaflet-popup-content-wrapper { background: var(--cb); color: var(--ct); border: 1.5px solid var(--bdr); border-radius: 10px; box-shadow: none; }
  .leaflet-popup-tip { background: var(--cb); }

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="trippy-auth-overlay" style="position:fixed;inset:0;z-index:99999;background:#f0f0ee;display:flex;align-items:center;justify-content:center;padding:1.5rem;font-family:'DM Sans',sans-serif;">
  <div id="auth-card" style="background:#fff;border:1.5px solid #c8c8c4;border-radius:20px;padding:2rem;width:100%;max-width:380px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:2rem;">
      <svg width="42" height="42" viewBox="0 0 42 42" fill="none"><rect width="42" height="42" rx="13" fill="#1a1a18"/><circle cx="21" cy="17" r="6" stroke="#fff" stroke-width="2.2" fill="none"/><circle cx="21" cy="17" r="2.2" fill="#fff"/><path d="M14 34 Q17 28 21 23 Q25 28 28 34" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
      <div>
        <div style="font-size:21px;font-weight:600;color:#111110;">Trippy</div>
        <div style="font-size:12px;color:#6a6a66;">Gemeinsam auf Reisen</div>
      </div>
    </div>
    <div id="auth-tabs" style="display:flex;gap:4px;background:#e8e8e6;padding:4px;border-radius:9px;border:1.5px solid #c8c8c4;margin-bottom:1.25rem;">
      <button id="tab-login" onclick="authTab('login')" style="flex:1;padding:8px;font-size:13px;cursor:pointer;border-radius:6px;border:1.5px solid #a0a09c;background:#fff;color:#111110;font-family:'DM Sans',sans-serif;font-weight:500;">Anmelden</button>
      <button id="tab-register" onclick="authTab('register')" style="flex:1;padding:8px;font-size:13px;cursor:pointer;border-radius:6px;border:1.5px solid transparent;background:none;color:#6a6a66;font-family:'DM Sans',sans-serif;font-weight:400;">Registrieren</button>
    </div>
    <div id="form-login">
      <input id="auth-email" type="email" placeholder="E-Mail" style="width:100%;padding:9px 11px;border:1.5px solid #a0a09c;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box;margin-bottom:10px;"/>
      <input id="auth-pw" type="password" placeholder="Passwort" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;padding:9px 11px;border:1.5px solid #a0a09c;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box;margin-bottom:16px;"/>
      <button onclick="doLogin()" style="width:100%;padding:11px;border-radius:8px;border:none;background:#1a1a18;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;">Anmelden</button>
    </div>
    <div id="form-register" style="display:none;">
      <input id="auth-name" type="text" placeholder="Dein Name (z.B. Simon)" style="width:100%;padding:9px 11px;border:1.5px solid #a0a09c;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box;margin-bottom:10px;"/>
      <input id="auth-reg-email" type="email" placeholder="E-Mail" style="width:100%;padding:9px 11px;border:1.5px solid #a0a09c;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box;margin-bottom:10px;"/>
      <input id="auth-reg-pw" type="password" placeholder="Passwort (min. 6 Zeichen)" onkeydown="if(event.key==='Enter')doRegister()" style="width:100%;padding:9px 11px;border:1.5px solid #a0a09c;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box;margin-bottom:16px;"/>
      <button onclick="doRegister()" style="width:100%;padding:11px;border-radius:8px;border:none;background:#1a1a18;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;">Konto erstellen</button>
    </div>
    <div id="auth-msg" style="font-size:13px;margin-top:12px;text-align:center;color:#6a6a66;min-height:20px;"></div>
    <div style="margin-top:16px;text-align:center;">
      <button onclick="authTab('join')" style="background:none;border:none;color:#1a1a18;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;text-decoration:underline;">Mit Einladungscode beitreten</button>
    </div>
  </div>
  <div id="join-card" style="display:none;background:#fff;border:1.5px solid #c8c8c4;border-radius:20px;padding:2rem;width:100%;max-width:380px;">
    <button onclick="authTab('login')" style="background:none;border:none;color:#6a6a66;font-size:13px;cursor:pointer;margin-bottom:1rem;font-family:'DM Sans',sans-serif;">&#8592; Zurück</button>
    <div style="font-size:18px;font-weight:600;color:#111110;margin-bottom:.5rem;">Reise beitreten</div>
    <div style="font-size:13px;color:#6a6a66;margin-bottom:1.25rem;">Gib den 6-stelligen Code ein den du erhalten hast.</div>
    <input id="join-code" type="text" maxlength="6" placeholder="ABC123" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')doJoin()" style="width:100%;padding:12px;text-transform:uppercase;text-align:center;font-size:22px;font-family:'DM Mono',monospace;letter-spacing:.15em;border:1.5px solid #a0a09c;border-radius:8px;outline:none;box-sizing:border-box;margin-bottom:10px;"/>
    <button onclick="doJoin()" style="width:100%;padding:11px;border-radius:8px;border:none;background:#1a1a18;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;">Beitreten</button>
    <div id="join-msg" style="font-size:13px;margin-top:12px;text-align:center;color:#6a6a66;min-height:20px;"></div>
  </div>
</div>

<div class="app" style="display:none;" id="app">
  <div id="pg-home"></div>
  <div id="pg-split" class="hidden"></div>
  <div id="pg-pack" class="hidden"></div>
  <div id="pg-map" class="hidden"></div>
  <div id="pg-notes" class="hidden"></div>
  <div id="pg-chat" class="hidden"></div>
  <div id="pg-weather" class="hidden"></div>
  <div id="pg-currency" class="hidden"></div>
</div>



<div id="maps-chooser-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);align-items:center;justify-content:center;">
  <div style="background:var(--cb);border:2px solid var(--bdr2);border-radius:16px;padding:1.5rem;width:88%;max-width:340px;font-family:'DM Sans',sans-serif;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;"><div style="font-size:16px;font-weight:600;color:var(--ct);">In welcher App öffnen?</div><button id="maps-btn-cancel-x" onclick="document.getElementById('maps-chooser-modal').style.display='none';if(window._mapRouteMode==='transit')setRouteMode('straight');" style="background:none;border:none;cursor:pointer;color:var(--cm);font-size:22px;line-height:1;padding:0;">×</button></div>
    <div style="font-size:13px;color:var(--cm);margin-bottom:1.25rem;">Wähle deine bevorzugte Karten-App</div>
    <button id="maps-btn-google" style="width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--bdr2);background:var(--hov);color:var(--ct);cursor:pointer;font-size:14px;font-weight:500;margin-bottom:8px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;">
      🗺 Google Maps
    </button>
    <button id="maps-btn-apple" style="width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--bdr2);background:var(--hov);color:var(--ct);cursor:pointer;font-size:14px;font-weight:500;margin-bottom:14px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;">
      🍎 Apple Maps
    </button>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--cm);margin-bottom:14px;cursor:pointer;">
      <input type="checkbox" id="maps-always" style="width:15px;height:15px;accent-color:var(--acc);">
      Immer diese App verwenden
    </label>
    <button id="maps-btn-cancel" style="width:100%;padding:9px;border-radius:10px;border:1.5px solid var(--bdr2);background:none;color:var(--cm);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;">✕ Abbrechen</button>
  </div>
</div>
<div id="confirm-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);align-items:center;justify-content:center;">
  <div style="background:var(--cb);border:2px solid var(--bdr2);border-radius:16px;padding:1.5rem;width:88%;max-width:360px;font-family:'DM Sans',sans-serif;">
    <div id="confirm-title" style="font-size:16px;font-weight:600;color:var(--ct);margin-bottom:.5rem;"></div>
    <div id="confirm-msg" style="font-size:14px;color:var(--cm);margin-bottom:1.25rem;line-height:1.5;"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;">
      <button id="confirm-cancel" onclick="resolveConfirm(false)" style="padding:8px 18px;border-radius:8px;border:1.5px solid var(--bdr2);background:none;color:var(--ct);cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;">Abbrechen</button>
      <button id="confirm-ok" onclick="resolveConfirm(true)" style="padding:8px 18px;border-radius:8px;border:none;background:#dc2626;color:white;cursor:pointer;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;">Löschen</button>
    </div>
  </div>
</div>

  <svg width="22" height="22" fill="none" viewBox="0 0 22 22"><path d="M4 4h14a2 2 0 012 2v8a2 2 0 01-2 2H8l-4 3V6a2 2 0 012-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</div>

    </div>
  </div>
</div>

<script>
var trips = {}, curId = null;
var editId = null, editKind = null;
var selPP = [], packFilter = 'all', splitMode = 'equal';
var CAT = ['Allgemein','Dokumente','Kleidung','Hygiene','Essen','Elektronik','Sonstiges'];

var THEMES = {
  standard: { name:'Standard', bg:'#f0f0ee', cb:'#ffffff', hov:'#e6e6e4', bdr:'#c8c8c4', bdr2:'#9a9a96', ct:'#111110', cm:'#686866', acc:'#1a1a18', acct:'#ffffff', inp:'#ffffff', inpb:'#9a9a96', inpt:'#111110' },
  mono:     { name:'Monochrom', bg:'#f8f8f8', cb:'#eeeeee', hov:'#e0e0e0', bdr:'#c0c0c0', bdr2:'#909090', ct:'#000000', cm:'#707070', acc:'#000000', acct:'#ffffff', inp:'#f8f8f8', inpb:'#909090', inpt:'#000000' },
  ocean:    { name:'Ozean', bg:'#d8e8f8', cb:'#ffffff', hov:'#bcd4f0', bdr:'#78a8e0', bdr2:'#4880cc', ct:'#082050', cm:'#2a5a9a', acc:'#0e40b8', acct:'#ffffff', inp:'#ffffff', inpb:'#4880cc', inpt:'#082050' },
  forest:   { name:'Wald', bg:'#d4ecdc', cb:'#ffffff', hov:'#b8e0c4', bdr:'#68b880', bdr2:'#3a9050', ct:'#082018', cm:'#245a32', acc:'#126030', acct:'#ffffff', inp:'#ffffff', inpb:'#3a9050', inpt:'#082018' },
  sunset:   { name:'Sonnenuntergang', bg:'#f8e8c8', cb:'#fffcf4', hov:'#f0d8a0', bdr:'#d0a048', bdr2:'#b07820', ct:'#3a1800', cm:'#8a5010', acc:'#b86800', acct:'#ffffff', inp:'#fffcf4', inpb:'#b07820', inpt:'#3a1800' },
  rose:     { name:'Rose', bg:'#f8d8e8', cb:'#fff5f8', hov:'#f0b8d0', bdr:'#d87098', bdr2:'#c04070', ct:'#440020', cm:'#903050', acc:'#c02868', acct:'#ffffff', inp:'#fff5f8', inpb:'#c04070', inpt:'#440020' },
  midnight: { name:'Mitternacht', bg:'#0c0e1a', cb:'#141828', hov:'#1c2238', bdr:'#2c3458', bdr2:'#404e80', ct:'#d8dcf0', cm:'#7880b0', acc:'#6070f0', acct:'#ffffff', inp:'#1a1e30', inpb:'#404e80', inpt:'#d8dcf0' },
  charcoal: { name:'Kohle', bg:'#0e0e0e', cb:'#1c1c1c', hov:'#282828', bdr:'#404040', bdr2:'#606060', ct:'#f0f0f0', cm:'#a0a0a0', acc:'#e0e0e0', acct:'#0e0e0e', inp:'#242424', inpb:'#606060', inpt:'#f0f0f0' },
  slate:    { name:'Schiefer', bg:'#141c2c', cb:'#1c2838', hov:'#243448', bdr:'#304460', bdr2:'#486488', ct:'#dce8f8', cm:'#6888b0', acc:'#3888e0', acct:'#ffffff', inp:'#18222e', inpb:'#486488', inpt:'#dce8f8' },
  sand:     { name:'Sand', bg:'#ece4d0', cb:'#faf6ec', hov:'#e0d4bc', bdr:'#c0a870', bdr2:'#a07840', ct:'#3a2810', cm:'#806040', acc:'#7a5022', acct:'#ffffff', inp:'#faf6ec', inpb:'#a07840', inpt:'#3a2810' },
  lavender: { name:'Lavendel', bg:'#e8e0f8', cb:'#f8f4ff', hov:'#d8ccf4', bdr:'#b0a0e0', bdr2:'#8878cc', ct:'#280850', cm:'#6050a8', acc:'#5030c0', acct:'#ffffff', inp:'#f8f4ff', inpb:'#8878cc', inpt:'#280850' },
  nordic:   { name:'Nordisch', bg:'#101820', cb:'#182230', hov:'#202e40', bdr:'#2c3e58', bdr2:'#3a5478', ct:'#e0e8f8', cm:'#6080a8', acc:'#2888cc', acct:'#ffffff', inp:'#141e2c', inpb:'#3a5478', inpt:'#e0e8f8' }
};
var curTheme = 'standard';

function applyTheme(k) {
  curTheme = k; var t = THEMES[k]; var r = document.documentElement.style;
  Object.keys(t).forEach(function(key) { if (key !== 'name') r.setProperty('--' + key, t[key]); });
  document.body.style.background = t.bg;
  document.getElementById('app').style.background = t.bg;
  var drawer = document.getElementById('drawer');
  drawer.style.background = t.cb;
  var di = document.getElementById('drawer-inner');
  if (di) { di.style.background = t.cb; di.style.borderLeftColor = t.bdr2; }
  if (drawer.classList.contains('open')) rDrawer();
  // Re-render current visible page so hardcoded theme colors update
  var logoEl = document.getElementById('trippy-logo');
  if (logoEl) logoEl.innerHTML = Logo();
  if (document.getElementById('pg-home') && document.getElementById('pg-home').className !== 'hidden') rHome();
  // Refresh map sidebar colors if on map page
  if (document.getElementById('pg-map') && document.getElementById('pg-map').className !== 'hidden') renderMapSidebar();
}

function trip() { return trips[curId] || { persons:[], expenses:[], packItems:[] }; }
function P() { return trip().persons || []; }
function E() { return trip().expenses || []; }
function PK() { return trip().packItems || []; }

function mkTrip(name) {
  var id = 't' + Date.now();
  trips[id] = { id:id, name:name||'Neue Reise', persons:[], expenses:[], packItems:[] };
  return id;
}

function nav(pg) {
  ['home','split','pack','map','notes','chat','weather','currency'].forEach(function(p) {
    var el = document.getElementById('pg-' + p);
    if (el) el.className = p === pg ? '' : 'hidden';
  });
  if (pg === 'home') rHome();
  if (pg === 'split') { splitMode = 'equal'; rSplit(); }
  if (pg === 'pack') { selPP = []; packFilter = 'all'; rPack(); }
  if (pg === 'map') rMap();
  if (pg === 'notes') rNotes();
  if (pg === 'weather') rWeather();
  if (pg === 'currency') rCurrency();
}

/* ── LOGO ── */
function Logo() {
  var t = THEMES[curTheme];
  return '<svg width="42" height="42" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">' +
    '<rect width="42" height="42" rx="13" fill="' + t.acc + '"/>' +
    '<circle cx="21" cy="17" r="6" stroke="' + t.acct + '" stroke-width="2.2" fill="none"/>' +
    '<circle cx="21" cy="17" r="2.2" fill="' + t.acct + '"/>' +
    '<path d="M21 23 C21 23 13 29 13 34 L29 34 C29 29 21 23 21 23Z" fill="' + t.acct + '" opacity=".25"/>' +
    '<path d="M14 34 Q17 28 21 23 Q25 28 28 34" stroke="' + t.acct + '" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>' +
    '</svg>';
}

/* ── HOME ── */
function rHome() {
  var tr = trip(), t = THEMES[curTheme];
  var ec = E().length;
  var pd = PK().filter(function(i){return i.done;}).length, pt = PK().length;

  function card(dest, bg, iconSvg, iconBg, title, sub) {
    return '<button onclick="nav(\'' + dest + '\')" style="background:'+t.cb+';border:1.5px solid '+t.bdr+';border-radius:14px;padding:1.25rem;cursor:pointer;text-align:left;font-family:DM Sans,sans-serif;width:100%;">' +
      '<div style="width:36px;height:36px;border-radius:10px;background:'+iconBg+';display:flex;align-items:center;justify-content:center;margin-bottom:14px;">' +
      '<svg width="16" height="16" fill="none" viewBox="0 0 16 16">'+iconSvg+'</svg></div>' +
      '<div style="font-size:15px;font-weight:500;color:'+t.ct+';margin-bottom:3px;">'+title+'</div>' +
      '<div style="font-size:12px;color:'+t.cm+';">'+sub+'</div>' +
      '</button>';
  }

  // Row 1: Packliste (TL), Karte (TR)
  var c1 = card('pack', t.cb,
    '<rect x="2" y="3" width="12" height="11" rx="2" stroke="#16a34a" stroke-width="1.5"/><path d="M5 8.5l2 2 4-4" stroke="#16a34a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>',
    '#dcfce7', 'Packliste', pt ? pd+'/'+pt+' gepackt' : 'Was kommt mit?');

  var c2 = card('map', t.cb,
    '<path d="M8 1a4 4 0 014 4c0 4-4 10-4 10S4 9 4 5a4 4 0 014-4z" fill="#d97706"/><circle cx="8" cy="5" r="1.5" fill="white"/>',
    '#fef3c7', 'Karte', 'Route & Highlights');

  // Row 2: Ausgaben (BL), Notizen (BR)
  var c3 = card('split', t.cb,
    '<path d="M3 8h10M10 4l4 4-4 4" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>',
    '#dbeafe', 'Ausgaben', ec ? ec+' Ausgabe'+(ec===1?'':'n') : 'Kosten aufteilen');

  var notesCount = (tr.notes||[]).length;
  var c4 = card('notes', t.cb,
    '<path d="M3 4h10M3 8h7M3 12h5" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>',
    '#f3e8ff', 'Notizen', notesCount ? notesCount+' Notiz'+(notesCount===1?'':'en') : 'Ideen festhalten');

  // Row 3: Wetter (BL), Währung (BR)
  var destCity = tr.weatherCity || tr.name || 'Stadt';
    var c5 = card('weather', t.cb,
    '<circle cx="8" cy="8" r="4" fill="#fbbf24"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M11.4 3.2l-1.4 1.4M4.6 11.4l-1.4 1.4" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>',
    '#fffbeb', 'Wetter', destCity);

  var c6 = card('currency', t.cb,
    '<text x="3" y="13" font-size="14" font-weight="800" fill="#059669" font-family="sans-serif">€</text>',
    '#ecfdf5', 'Währung', 'Kurse & Umrechner');

  document.getElementById('pg-home').innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.75rem;">' +
    '<div style="display:flex;align-items:center;gap:12px;"><span id="trippy-logo">' + Logo() + '</span>' +
    '<div><div style="font-size:21px;font-weight:600;color:' + t.ct + ';letter-spacing:-.3px;">Trippy</div>' +
    '<div style="font-size:12px;color:' + t.cm + ';margin-top:1px;">' + tr.name + '</div></div></div>' +
    '<button class="btn-icon" onclick="openDrawer()" style="width:38px;height:38px;" title="Einstellungen">' +
    '<svg width="16" height="16" fill="none" viewBox="0 0 16 16"><circle cx="4" cy="8" r="1.5" fill="currentColor"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><circle cx="12" cy="8" r="1.5" fill="currentColor"/></svg>' +
    '</button></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">' +
    c1 + c2 + c3 + c4 + c5 + c6 +
    '</div>';
}


function NC(dest, ibg, ipath, title, sub) {
  return '<button class="nav-card" onclick="nav(\'' + dest + '\')">' +
    '<div class="nav-icon" style="background:' + ibg + ';"><svg width="16" height="16" fill="none" viewBox="0 0 16 16">' + ipath + '</svg></div>' +
    '<div style="font-size:15px;font-weight:500;color:var(--ct);margin-bottom:3px;">' + title + '</div>' +
    '<div style="font-size:12px;color:var(--cm);">' + sub + '</div></button>';
}

/* ── SPLIT ── */
function rSplit() {
  document.getElementById('pg-split').innerHTML =
    '<button class="back-btn" onclick="nav(\'home\')"><svg width="14" height="14" fill="none" viewBox="0 0 14 14"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Zurück</button>' +
    '<div style="font-size:18px;font-weight:600;color:var(--ct);margin-bottom:1.25rem;letter-spacing:-.2px;">Ausgaben</div>' +
    '<div class="tab-bar" id="stabs">' +
    '<button class="tab-btn active" id="st-aus" onclick="stab(\'aus\')">Ausgaben</button>' +
    '<button class="tab-btn" id="st-abr" onclick="stab(\'abr\')">Abrechnung</button></div>' +
    '<div id="sp-aus">' + rSplitForm() + rExpList() + '</div>' +
    '<div id="sp-abr" class="hidden">' + rBal() + rTrans() + '</div>';
  updateSP();
}

function stab(id) {
  document.getElementById('sp-aus').className = id === 'aus' ? '' : 'hidden';
  document.getElementById('sp-abr').className = id === 'abr' ? '' : 'hidden';
  document.getElementById('st-aus').className = 'tab-btn' + (id === 'aus' ? ' active' : '');
  document.getElementById('st-abr').className = 'tab-btn' + (id === 'abr' ? ' active' : '');
  if (id === 'abr') { document.getElementById('sp-abr').innerHTML = rBal() + rTrans(); }
}

function rSplitForm() {
  var ps = P();
  return '<div class="card">' +
    '<div class="sec-title">Neue Ausgabe</div>' +
    '<div class="row"><input id="di" type="text" placeholder="Beschreibung" style="flex:2"/>' +
    '<input id="ai" type="number" placeholder="Betrag €" max="1000000" min="0" style="flex:1;min-width:88px;" oninput="uHint()"/></div>' +
    '<div class="row"><select id="pi"><option value="">Bezahlt von...</option>' +
    ps.map(function(p){ return '<option>' + p + '</option>'; }).join('') + '</select></div>' +
    '<div class="divider"></div>' +
    '<div class="sec-title">Aufteilung</div>' +
    '<div class="split-tog" id="mtog">' +
    '<button class="sopt active" data-m="equal" onclick="setSplit(\'equal\',this)">Gleich</button>' +
    '<button class="sopt" data-m="select" onclick="setSplit(\'select\',this)">Bestimmte</button>' +
    '<button class="sopt" data-m="custom" onclick="setSplit(\'custom\',this)">Individuell</button></div>' +
    '<div id="spanel"></div>' +
    '<div id="shint" style="font-size:12px;margin-top:6px;"></div>' +
    '<div class="divider"></div>' +
    '<div style="display:flex;justify-content:flex-end;"><button class="btn-p" onclick="addExp()">Ausgabe erfassen</button></div></div>';
}

function setSplit(mode, btn) {
  splitMode = mode;
  document.querySelectorAll('#mtog .sopt').forEach(function(b){ b.className = 'sopt' + (b.dataset.m === mode ? ' active' : ''); });
  updateSP();
  var h = document.getElementById('shint'); if (h) h.textContent = '';
}

function updateSP() {
  var p = document.getElementById('spanel'); if (!p) return;
  var ps = P();
  if (splitMode === 'equal') { p.innerHTML = '<div style="font-size:13px;color:var(--cm);">' + (ps.length === 0 ? 'Personen in Einstellungen hinzufügen.' : 'Gleichmäßig auf alle ' + ps.length + ' Personen.') + '</div>'; return; }
  if (splitMode === 'select') {
    p.innerHTML = '<div style="font-size:13px;color:var(--cm);margin-bottom:8px;">Welche Personen?</div>' +
      ps.map(function(q){ return '<div style="padding:7px 0;border-bottom:1.5px solid var(--bdr);"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--ct);font-size:14px;"><input type="checkbox" class="sch" value="' + q + '" checked style="width:16px;height:16px;flex-shrink:0;accent-color:var(--acc);">' + q + '</label></div>'; }).join('');
    return;
  }
  p.innerHTML = '<div style="font-size:13px;color:var(--cm);margin-bottom:8px;">Betrag pro Person:</div>' +
    ps.map(function(q){ return '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1.5px solid var(--bdr);">' +
      '<span style="flex:1;color:var(--ct);font-size:14px;">' + q + '</span>' +
      '<input type="number" class="cch" data-p="' + q + '" placeholder="0.00" min="0" step="0.01" oninput="uHint()" style="width:82px;text-align:right;padding:5px 8px;">' +
      '<span style="color:var(--cm);font-size:13px;">€</span></div>'; }).join('');
}

function uHint() {
  var tot = parseFloat((document.getElementById('ai')||{}).value) || 0;
  var ins = document.querySelectorAll('.cch'); if (!ins.length) return;
  var sum = 0; ins.forEach(function(x){ sum += parseFloat(x.value) || 0; });
  var h = document.getElementById('shint'); if (!h) return;
  var d = Math.round((tot - sum) * 100) / 100;
  if (tot === 0) { h.textContent = ''; return; }
  if (Math.abs(d) < 0.01) { h.textContent = '✓ Passt!'; h.style.color = '#16a34a'; }
  else if (d > 0) { h.textContent = 'Noch ' + d.toFixed(2) + ' € zuzuweisen.'; h.style.color = '#dc2626'; }
  else { h.textContent = Math.abs(d).toFixed(2) + ' € zu viel.'; h.style.color = '#dc2626'; }
}

function bldSplits(amt, mode) {
  var sp = {}, ps = P();
  if (mode === 'equal') { var s = amt/ps.length; ps.forEach(function(q){ sp[q] = Math.round(s*100)/100; }); }
  else if (mode === 'select') { var ch = Array.from(document.querySelectorAll('.sch:checked')).map(function(x){ return x.value; }); if (!ch.length) return null; var s2 = amt/ch.length; ch.forEach(function(q){ sp[q] = Math.round(s2*100)/100; }); }
  else { var ins = document.querySelectorAll('.cch'); var sm = 0; ins.forEach(function(x){ var v = parseFloat(x.value)||0; if (v>0){ sp[x.dataset.p]=v; sm+=v; } }); if (Math.abs(sm-amt)>0.01) return null; }
  return sp;
}

function addExp() {
  var d = (document.getElementById('di')||{}).value.trim();
  var a = parseFloat((document.getElementById('ai')||{}).value);
  var py = (document.getElementById('pi')||{}).value;
  if (!d || isNaN(a) || a<=0 || !py || P().length < 2) return;
  if (a > 1000000) { showToast('Maximaler Betrag: 1.000.000 €', 'error'); return; }
  var sp = bldSplits(a, splitMode); if (!sp) return;
  trip().expenses.push({ id: Date.now(), desc:d, amount:a, payer:py, splits:sp, mode:splitMode });
  rSplit();
}

function rmExp(id) { showConfirm('Ausgabe löschen','Diese Ausgabe wirklich löschen?').then(function(ok){ if(!ok) return; trip().expenses = E().filter(function(x){ return x.id !== id; }); rSplit(); }); }

function rExpList() {
  var exps = E(), mL = {equal:'Gleich',select:'Teilgruppe',custom:'Individuell'};
  var stats = '';
  if (exps.length > 0) {
    var tot = exps.reduce(function(s,e){ return s+e.amount; }, 0);
    stats = '<div style="display:flex;gap:8px;margin-bottom:1rem;">' +
      '<div class="stat-box"><div class="stat-label">Gesamt</div><div class="stat-val" style="white-space:nowrap;">' + tot.toFixed(2) + ' €</div></div>' +
      '<div class="stat-box"><div class="stat-label">Ausgaben</div><div class="stat-val">' + exps.length + '</div></div></div>';
  }
  var list = exps.length === 0 ? '<div class="empty">Noch keine Ausgaben erfasst</div>' :
    exps.map(function(e){
      var pills = Object.keys(e.splits).map(function(q){ return '<span class="exp-pill">' + q + ': ' + e.splits[q].toFixed(2) + ' €</span>'; }).join('');
      return '<div class="exp-card">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
        '<div><div style="font-size:15px;font-weight:500;color:var(--ct);">' + e.desc + '</div>' +
        '<div style="font-size:12px;color:var(--cm);margin-top:2px;">von <strong>' + e.payer + '</strong> · ' + mL[e.mode] + '</div></div>' +
        '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">' +
        '<span style="font-size:14px;font-weight:500;color:var(--ct);white-space:nowrap;">' + e.amount.toFixed(2) + ' €</span>' +
        '<button class="btn-icon" onclick="openEditExp(' + e.id + ')"><svg width="12" height="12" fill="none" viewBox="0 0 12 12"><path d="M8.5 1.5l2 2-7 7H1.5v-2l7-7z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>' +
        '<button class="btn-icon" onclick="rmExp(' + e.id + ')"><svg width="12" height="12" fill="none" viewBox="0 0 12 12"><path d="M2 2l8 8M10 2L2 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>' +
        '</div></div><div class="exp-pills">' + pills + '</div></div>';
    }).join('');
  return '<div class="card">' + stats + '<div class="sec-title">Alle Ausgaben</div>' + list + '</div>';
}

function calcBal() {
  var ps = P(), paid = {}, owes = {};
  ps.forEach(function(q){ paid[q]=0; owes[q]=0; });
  E().forEach(function(e){ paid[e.payer]=(paid[e.payer]||0)+e.amount; Object.keys(e.splits).forEach(function(q){ owes[q]=(owes[q]||0)+e.splits[q]; }); });
  return ps.map(function(q){ return { name:q, paid:paid[q]||0, owes:owes[q]||0, bal:Math.round(((paid[q]||0)-(owes[q]||0))*100)/100 }; });
}

function rBal() {
  if (P().length < 2 || E().length === 0) return '<div class="card"><div class="sec-title">Salden</div><div class="empty">Noch keine Ausgaben</div></div>';
  return '<div class="card"><div class="sec-title">Was jeder zahlen muss</div>' +
    calcBal().map(function(b){
      if (Math.abs(b.bal) < 0.01) return '<div class="bal-card" style="background:var(--hov);border-color:var(--bdr);"><div><div style="font-size:15px;font-weight:500;color:var(--ct);">' + b.name + '</div><div style="font-size:12px;color:var(--cm);margin-top:2px;">Anteil: ' + b.owes.toFixed(2) + ' € · Bezahlt: ' + b.paid.toFixed(2) + ' €</div></div><div style="font-size:13px;color:var(--cm);">Ausgeglichen</div></div>';
      if (b.bal > 0) return '<div class="bal-card" style="border-left:3px solid #16a34a;"><div><div style="font-size:15px;font-weight:500;color:var(--ct);">' + b.name + '</div><div style="font-size:12px;color:var(--cm);margin-top:2px;">Anteil: ' + b.owes.toFixed(2) + ' € · Bezahlt: ' + b.paid.toFixed(2) + ' €</div></div><div class="bal-amt" style="color:#16a34a;">+' + b.bal.toFixed(2) + ' €</div></div>';
      return '<div class="bal-card" style="border-left:3px solid #dc2626;"><div><div style="font-size:15px;font-weight:500;color:var(--ct);">' + b.name + '</div><div style="font-size:12px;color:var(--cm);margin-top:2px;">Anteil: ' + b.owes.toFixed(2) + ' € · Bezahlt: ' + b.paid.toFixed(2) + ' €</div></div><div class="bal-amt" style="color:#dc2626;">' + b.bal.toFixed(2) + ' €</div></div>';
    }).join('') + '</div>';
}

function rTrans() {
  if (P().length < 2 || E().length === 0) return '<div class="card"><div class="sec-title">Überweisungen</div><div class="empty">Noch keine Ausgaben</div></div>';
  var bal = calcBal();
  var d = bal.filter(function(b){ return b.bal < -0.01; }).map(function(b){ return {name:b.name,amount:-b.bal}; });
  var cr = bal.filter(function(b){ return b.bal > 0.01; }).map(function(b){ return {name:b.name,amount:b.bal}; });
  if (!d.length) return '<div class="card"><div class="sec-title">Überweisungen</div><div class="empty">Alle ausgeglichen! 🎉</div></div>';
  var tr = []; var i = 0, j = 0;
  while (i < d.length && j < cr.length) { var a = Math.min(d[i].amount,cr[j].amount); tr.push({from:d[i].name,to:cr[j].name,amount:Math.round(a*100)/100}); d[i].amount-=a; cr[j].amount-=a; if(d[i].amount<0.01)i++; if(cr[j].amount<0.01)j++; }
  return '<div class="card"><div class="sec-title">Überweisungen</div>' +
    tr.map(function(t){ return '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--hov);border-radius:8px;margin-bottom:6px;font-size:14px;border:1.5px solid var(--bdr);"><span style="font-weight:500;color:var(--ct);">' + t.from + '</span><span style="color:var(--cm);">→</span><span style="font-weight:500;color:var(--ct);">' + t.to + '</span><span style="font-weight:500;color:var(--ct);margin-left:auto;font-family:\'DM Mono\',monospace;">' + t.amount.toFixed(2) + ' €</span></div>'; }).join('') + '</div>';
}

function getSugg() {
  var result = {};
  var existing = PK().map(function(i){ return i.name.toLowerCase(); });
  // base items
  var types = selTypes.length > 0 ? selTypes : [];
  Object.keys(SUGG_DATA._base).forEach(function(cat) {
    result[cat] = SUGG_DATA._base[cat].filter(function(s){ return existing.indexOf(s.toLowerCase()) < 0; });
  });
  // type-specific
  types.forEach(function(type) {
    var s = SUGG_DATA[type]; if (!s) return;
    Object.keys(s).forEach(function(cat) {
      if (!result[cat]) result[cat] = [];
      s[cat].forEach(function(item) {
        if (result[cat].indexOf(item) < 0 && existing.indexOf(item.toLowerCase()) < 0) result[cat].push(item);
      });
    });
  });
  // remove empty cats
  Object.keys(result).forEach(function(cat){ if (!result[cat].length) delete result[cat]; });
  return result;
}

  suggOpen = !suggOpen;

function togType(key) {
  var i = selTypes.indexOf(key);
  if (i >= 0) selTypes.splice(i,1); else selTypes.push(key);

}

function addSugg(name, cat) {
  trip().packItems.push({ id: Date.now() + Math.floor(Math.random()*1000), name: name, cat: cat, persons: [], done: false });

}

function addAllSugg() {
  var sugg = getSugg();
  var CAT_O = ['Allgemein','Dokumente','Kleidung','Hygiene','Essen','Elektronik','Sonstiges'];
  CAT_O.forEach(function(cat) {
    if (!sugg[cat]) return;
    sugg[cat].forEach(function(name) {

var _mapsAppPref = null; // null = ask, 'google', 'apple'

function openInMaps(lat, lng, label) {
  var gmUrl = 'https://www.google.com/maps/search/?api=1&query=' + lat + ',' + lng;
  var apUrl = 'https://maps.apple.com/?q=' + encodeURIComponent(label||'') + '&ll=' + lat + ',' + lng;
  chooseMapsApp(gmUrl, apUrl);
}

function openRouteInMaps(pts) {
  var coords = pts.map(function(p){return p.lat+','+p.lng;}).join('/');
  var gmUrl = 'https://www.google.com/maps/dir/' + coords;
  var apUrl = 'https://maps.apple.com/?daddr=' + pts.map(function(p){return p.lat+','+p.lng;}).join('+to:');
  chooseMapsApp(gmUrl, apUrl);
}

function chooseMapsApp(gmUrl, apUrl) {
  if (_mapsAppPref === 'google') { window.open(gmUrl, '_blank'); return; }
  if (_mapsAppPref === 'apple')  { window.open(apUrl, '_blank'); return; }
  // Show chooser
  var t = THEMES[curTheme];
  var modal = document.getElementById('maps-chooser-modal');
  if (!modal) return;
  modal.style.display = 'flex';
  document.getElementById('maps-btn-google').onclick = function() {
    var pref = document.getElementById('maps-always').checked ? 'google' : null;
    if (pref) _mapsAppPref = pref;
    modal.style.display = 'none';
    window.open(gmUrl, '_blank');
  };
  document.getElementById('maps-btn-apple').onclick = function() {
    var pref = document.getElementById('maps-always').checked ? 'apple' : null;
    if (pref) _mapsAppPref = pref;
    modal.style.display = 'none';
    window.open(apUrl, '_blank');
  };
  document.getElementById('maps-btn-cancel').onclick = function() {
    modal.style.display = 'none';
    // If ÖPNV triggered this chooser, revert route mode to straight
    if (window._mapRouteMode === 'transit') setRouteMode('straight');

}

function getTripDays() {
  var tr = trip();
  if (!tr.dateStart || !tr.dateEnd) return null;
  var d1 = new Date(tr.dateStart), d2 = new Date(tr.dateEnd);

function rESP(mode, ex) {
  var p = document.getElementById('esp'); if (!p) return; var ps = P();
  if (mode==='equal') { p.innerHTML='<div style="font-size:13px;color:var(--cm);">Gleichmäßig auf alle ' + ps.length + ' Personen.</div>'; return; }
  if (mode==='select') { p.innerHTML=ps.map(function(q){ var ch=ex&&ex[q]!==undefined; return '<div style="padding:7px 0;border-bottom:1.5px solid var(--bdr);"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--ct);font-size:14px;"><input type="checkbox" class="esc" value="'+q+'"'+(ch?' checked':'')+' style="width:16px;height:16px;flex-shrink:0;accent-color:var(--acc);">'+q+'</label></div>'; }).join(''); return; }
  p.innerHTML=ps.map(function(q){ var v=ex&&ex[q]?ex[q]:''; return '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1.5px solid var(--bdr);"><span style="flex:1;color:var(--ct);font-size:14px;">'+q+'</span><input type="number" class="ecc" data-p="'+q+'" value="'+v+'" placeholder="0.00" min="0" step="0.01" oninput="uEH()" style="width:82px;text-align:right;padding:5px 8px;"><span style="color:var(--cm);font-size:13px;">€</span></div>'; }).join('');
}

function uEH() {
  var tot=parseFloat((document.getElementById('ea')||{}).value)||0;
  var ins=document.querySelectorAll('.ecc'); if(!ins.length) return;
  var sum=0; ins.forEach(function(x){sum+=parseFloat(x.value)||0;});
  var h=document.getElementById('esh'); if(!h) return;
  var d=Math.round((tot-sum)*100)/100;
  if(tot===0){h.textContent='';return;}
  if(Math.abs(d)<0.01){h.textContent='✓ Passt!';h.style.color='#16a34a';}
  else if(d>0){h.textContent='Noch '+d.toFixed(2)+' €.';h.style.color='#dc2626';}
  else{h.textContent=Math.abs(d).toFixed(2)+' € zu viel.';h.style.color='#dc2626';}
}

function saveEdit() {
  if (editKind==='exp') {
    var e = E().find(function(x){ return x.id===editId; });
    if (e) {
      e.desc = (document.getElementById('ed')||{}).value.trim() || e.desc;
      var a = parseFloat((document.getElementById('ea')||{}).value); if (!isNaN(a)&&a>0&&a<=1000000) e.amount=a; else if (a>1000000) { showToast('Maximaler Betrag: 1.000.000 €', 'error'); return; }
      e.payer = (document.getElementById('ep')||{}).value;
      var mode=window._esm; e.mode=mode; var sp={};
      if (mode==='equal') { var s=e.amount/P().length; P().forEach(function(q){sp[q]=Math.round(s*100)/100;}); }
      else if (mode==='select') { var ch=Array.from(document.querySelectorAll('.esc:checked')).map(function(x){return x.value;}); if(ch.length){var s2=e.amount/ch.length;ch.forEach(function(q){sp[q]=Math.round(s2*100)/100;});} }
      else { var ins=document.querySelectorAll('.ecc'),sm=0; ins.forEach(function(x){var v=parseFloat(x.value)||0;if(v>0){sp[x.dataset.p]=v;sm+=v;}}); if(Math.abs(sm-e.amount)>0.01){var h=document.getElementById('esh');if(h){h.textContent='Beträge stimmen nicht!';h.style.color='#dc2626';}return;} }
      if (Object.keys(sp).length>0) e.splits=sp;
    }

    var item = PK().find(function(x){ return x.id===editId; });

    }
    closeModal(); rPackList(); renderSuggPanel();
  }
}

function initMap() {
  // Always recreate because rMap() rebuilds innerHTML wiping the old container
  if (map) { try { map.remove(); } catch(e){} map = null; }
  var t = THEMES[curTheme];
  map = L.map('map-container', { zoomControl: true }).setView([48.1351, 11.5820], 6);
  // Try multiple tile providers - CartoDB doesn't need referer
  var tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20
  });
  tileLayer.addTo(map);
  map.on('click', function(e) {
    // Don't fire map click if a Leaflet popup is open (click came from inside popup)
    if (map._popup && map._popup.isOpen && map._popup.isOpen()) return;
    handleMapClick(e.latlng);
  });
  mapInited = true;
  renderMapMarkers();
}


function handleMapClick(latlng) {
  if (window._fsToggling) return; // ignore click after fullscreen toggle
  if (mapMode === 'none') return;
  // Ignore if an in-app modal/chooser is currently open
  var chooser = document.getElementById('maps-chooser-modal');
  if (chooser && chooser.style.display === 'flex') return;
  if (document.getElementById('trippy-prompt-modal')) return;
  var tr = trip();
  if (!tr.mapPoints) tr.mapPoints = [];
  if (!tr.mapHighlights) tr.mapHighlights = [];
  if (mapMode === 'marker') {
    var name = 'Stopp ' + (tr.mapPoints.length + 1);
    showPrompt('Name für diesen Stopp:', name, function(label) {
      if (label === null) return;
      tr.mapPoints.push({ lat: latlng.lat, lng: latlng.lng, name: label || name, id: Date.now() });
      renderMapMarkers();
      renderMapSidebar();
    });
    return;
  } else if (mapMode === 'highlight') {
    var htype = (document.getElementById('map-highlight-type') || {}).value || 'sight';
    var defaultName = HIGHLIGHT_ICONS[htype] ? HIGHLIGHT_ICONS[htype].label : 'Highlight';
    showPrompt('Name:', defaultName, function(hlabel) {
      if (hlabel === null) return;
      tr.mapHighlights.push({ lat: latlng.lat, lng: latlng.lng, name: hlabel || defaultName, type: htype, id: Date.now() });
      renderMapMarkers();
      renderMapSidebar();
    });
    return;
  } else if (mapMode === 'reposition') {
    // User clicked to set new position for a stop
    if (window._repositionStopId) {
      var rid = window._repositionStopId;
      var pt = (tr.mapPoints||[]).find(function(p){ return p.id == rid || String(p.id) === String(rid); }); // loose compare for safety
      if (pt) { pt.lat = latlng.lat; pt.lng = latlng.lng; }
      window._repositionStopId = null;
      mapMode = 'none';
      renderMapMarkers();
      renderMapSidebar();
      // Reset mode UI
      setMapMode('none');
      var hint = document.getElementById('map-reposition-hint');
      if (hint) hint.style.display = 'none';
    }
  }
  if (mapMode !== 'reposition') {
    renderMapMarkers();
    renderMapSidebar();
  }
}

// ── ROUTING ──────────────────────────────────────────────
var _mapRouteMode = 'straight';

function computeHaversine(pts) {
  var total = 0, R = 6371000;
  for (var i = 0; i < pts.length - 1; i++) {
    var lat1 = pts[i].lat * Math.PI/180, lat2 = pts[i+1].lat * Math.PI/180;
    var dlat = (pts[i+1].lat - pts[i].lat) * Math.PI/180;
    var dlng = (pts[i+1].lng - pts[i].lng) * Math.PI/180;
    var a = Math.sin(dlat/2)*Math.sin(dlat/2) + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dlng/2)*Math.sin(dlng/2);
    total += R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  return total;
}

function fmtDist(m) { return m >= 1000 ? (m/1000).toFixed(1)+' km' : Math.round(m)+' m'; }
function fmtDur(s)  { var m=Math.round(s/60); return m>=60 ? Math.floor(m/60)+'h '+Math.round(m%60)+'min' : m+' min'; }

function fetchOSRMRoute(pts, mode, t) {
  if (mode === 'transit') {
    openRouteInMaps(pts);
    // ÖPNV ist kein persistenter Modus – sofort zurück auf Luftlinie
    setRouteMode('straight');
    return;
  }
  // OSRM demo server profile names
  // router.project-osrm.org HTTP endpoint uses driving/walking/cycling
  var profiles = { car: 'driving', foot: 'walking', bike: 'cycling' };
  var profile = profiles[mode] || 'driving';
  var waypoints = pts.map(function(p){ return p.lng.toFixed(6)+','+p.lat.toFixed(6); }).join(';');
  // Try routing.openstreetmap.de (more reliable, supports all profiles)
  var url = 'https://routing.openstreetmap.de/routed-' + {'driving':'car','walking':'foot','cycling':'bike'}[profile] + '/route/v1/' + profile + '/' + waypoints + '?overview=full&geometries=geojson';

  setRouteInfo('Berechne Route…', t);

  fetch(url, { headers: { 'User-Agent': 'TrIppy/1.0' } })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      if (!data.routes || !data.routes.length) throw new Error('no route');
      var route = data.routes[0];
      // Draw route
      if (mapRouteLayer) { try { map.removeLayer(mapRouteLayer); } catch(e){} mapRouteLayer = null; }
      var coords = route.geometry.coordinates.map(function(c){ return [c[1], c[0]]; });
      mapRouteLayer = L.polyline(coords, { color: t.acc, weight: 4, opacity: 0.9 }).addTo(map);
      try { map.fitBounds(mapRouteLayer.getBounds(), { padding: [40, 40] }); } catch(e){}
      // Show info
      var icons = { car: '🚗', foot: '🚶', bike: '🚴' };
      setRouteInfo((icons[mode]||'') + ' ' + fmtDist(route.distance) + ' · ' + fmtDur(route.duration), t);
    })
    .catch(function(err) {
      console.warn('OSRM failed:', err.message, '– falling back to straight line');
      drawStraightLine(pts, t);
      setRouteInfo('⚠️ Route nicht verfügbar – Luftlinie', t);
    });
}

function drawStraightLine(pts, t) {
  if (mapRouteLayer) { try { map.removeLayer(mapRouteLayer); } catch(e){} mapRouteLayer = null; }
  var coords = pts.map(function(p){ return [p.lat, p.lng]; });
  mapRouteLayer = L.polyline(coords, { color: t.acc, weight: 3, opacity: 0.75, dashArray: '8 5' }).addTo(map);
}

function setRouteInfo(msg, t) {
  var el = document.getElementById('map-route-info');
  if (el) el.innerHTML = '<span style="font-size:13px;color:'+(t?t.ct:'var(--ct)')+';">'+msg+'</span>';
}

function setRouteMode(mode) {
  window._mapRouteMode = mode;
  var t = THEMES[curTheme];
  ['straight','car','foot','bike','transit'].forEach(function(m) {
    var btn = document.getElementById('rmode-'+m);
    if (!btn) return;
    var on = m === mode;
    btn.style.background  = on ? t.acc : t.cb;
    btn.style.color       = on ? t.acct : t.ct;
    btn.style.border      = on ? 'none' : '1.5px solid '+t.bdr2;
    btn.style.fontWeight  = on ? '600' : '400';
  });
  renderMapMarkers();
}

// ── MARKERS ──────────────────────────────────────────────
function renderMapMarkers() {
  if (!map) return;
  var t = THEMES[curTheme];
  mapMarkers.forEach(function(m){ try{ map.removeLayer(m); }catch(e){} });
  mapMarkers = [];
  if (mapRouteLayer) { try{ map.removeLayer(mapRouteLayer); }catch(e){} mapRouteLayer = null; }

  var tr = trip();
  var pts = tr.mapPoints  || [];
  var hls = tr.mapHighlights || [];
  var mode = window._mapRouteMode || 'straight';

  // Route
  if (pts.length >= 2) {
    if (mode === 'straight') {
      drawStraightLine(pts, t);
      var d = computeHaversine(pts);
      setRouteInfo('📏 Luftlinie: ' + fmtDist(d), t);
    } else {
      fetchOSRMRoute(pts, mode, t);
    }
  } else {
    setRouteInfo('', t);
  }

  // Stop markers
  pts.forEach(function(p, i) {
    var icon = L.divIcon({
      html: '<div style="width:28px;height:28px;border-radius:50%;background:'+t.acc+';color:'+t.acct+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3);">'+(i+1)+'</div>',
      className: '', iconSize: [28,28], iconAnchor: [14,14], popupAnchor: [0,-16]
    });
    var marker = L.marker([p.lat, p.lng], { icon: icon })
      .addTo(map)
      .bindPopup(
        '<div style="font-family:DM Sans,sans-serif;min-width:150px;">' +
        '<strong style="font-size:13px;display:block;margin-bottom:6px;">' + p.name + '</strong>' +
        '<button onclick="event.stopPropagation();openInMaps('+p.lat+','+p.lng+',\''+p.name+'\')" style="font-size:11px;color:'+t.acc+';background:none;border:none;cursor:pointer;padding:0;font-family:DM Sans,sans-serif;margin-top:4px;">In Karten-App öffnen ↗</button>' +
        '</div>'
      );
    mapMarkers.push(marker);
  });

  // Highlight markers
  hls.forEach(function(h) {
    var hi = HIGHLIGHT_ICONS[h.type] || HIGHLIGHT_ICONS.custom;
    var icon = L.divIcon({
      html: '<div style="width:28px;height:28px;border-radius:50%;background:'+hi.color+';display:flex;align-items:center;justify-content:center;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3);"><svg width="14" height="14" viewBox="0 0 16 16" fill="none">'+hi.svg+'</svg></div>',
      className: '', iconSize: [28,28], iconAnchor: [14,14], popupAnchor: [0,-16]
    });
    var marker = L.marker([h.lat, h.lng], { icon: icon })
      .addTo(map)
      .bindPopup(
        '<div style="font-family:DM Sans,sans-serif;min-width:150px;">' +
        '<strong style="font-size:13px;display:block;">'+h.name+'</strong>' +
        '<span style="font-size:11px;color:#888;">'+hi.label+'</span><br>' +
        '<button onclick="event.stopPropagation();openInMaps('+h.lat+','+h.lng+',\''+h.name+'\')" style="font-size:11px;color:'+t.acc+';background:none;border:none;cursor:pointer;padding:0;font-family:DM Sans,sans-serif;margin-top:4px;">In Karten-App öffnen ↗</button>' +
        '</div>'
      );
    mapMarkers.push(marker);
  });

  // Fit bounds if multiple points
  var all = pts.concat(hls);
  if (all.length >= 2) {
    try { map.fitBounds(all.map(function(p){ return [p.lat,p.lng]; }), { padding:[40,40] }); } catch(e){}
  } else if (all.length === 1) {
    map.setView([all[0].lat, all[0].lng], 13);
  }
}

// ── STOP EDITING ─────────────────────────────────────────
var _stopEditMode = false;
var _dragStopId = null;
var _dragOverId = null;


// ── TOUCH & MOUSE DRAG for stop reordering ────────────────
var _dragFromId = null;
var _dragToId = null;
var _isDragging = false;

function getStopIdFromEl(el) {
  if (!el) return null;
  var row = el;
  while (row && row.id && row.id.indexOf('stop-row-') !== 0) row = row.parentElement;
  if (!row || !row.id) return null;
  return parseInt(row.id.replace('stop-row-',''), 10);
}

function highlightDropZone(targetId) {
  document.querySelectorAll('[id^="stop-row-"]').forEach(function(el) {
    el.style.background = '';
    el.style.borderTop = '';
    el.style.marginTop = '';
  });
  if (targetId === null || targetId === _dragFromId) return;
  var el = document.getElementById('stop-row-' + targetId);
  if (el) {
    el.style.background = 'var(--hov)';
    el.style.borderTop = '2.5px solid var(--acc)';
  }
}

function doReorder(fromId, toId) {
  if (fromId === null || toId === null || fromId === toId) return;
  var pts = trip().mapPoints;
  var fromIdx = pts.findIndex(function(p){ return p.id == fromId; });
  var toIdx   = pts.findIndex(function(p){ return p.id == toId; });
  if (fromIdx < 0 || toIdx < 0) return;
  var item = pts.splice(fromIdx, 1)[0];
  pts.splice(toIdx, 0, item);
}

// ── Touch drag ──
var _lastTouchY = 0;
function touchDragStart(e, id) {
  e.preventDefault();
  _dragFromId = id; _dragToId = null; _isDragging = true;
  _lastTouchY = e.touches[0].clientY;
  var el = document.getElementById('stop-row-' + id);
  if (el) el.classList.add('stop-row-dragging');
}
function touchDragMove(e) {
  if (!_isDragging) return;
  e.preventDefault();
  var touch = e.touches[0];
  // Find element under finger (hide dragging element first)
  var dragEl = document.getElementById('stop-row-' + _dragFromId);
  if (dragEl) dragEl.style.visibility = 'hidden';
  var below = document.elementFromPoint(touch.clientX, touch.clientY);
  if (dragEl) dragEl.style.visibility = '';
  var targetId = getStopIdFromEl(below);
  if (targetId !== null && targetId !== _dragFromId) {
    _dragToId = targetId;
    highlightDropZone(targetId);
  }
}
function touchDragEnd(e) {
  if (!_isDragging) return;
  if (_dragFromId !== null && _dragToId !== null) {
    doReorder(_dragFromId, _dragToId);
  }
  highlightDropZone(null);
  var el = document.getElementById('stop-row-' + _dragFromId);
  if (el) el.classList.remove('stop-row-dragging');
  _dragFromId = null; _dragToId = null;
  setTimeout(function(){ _isDragging = false; }, 100);
  renderMapMarkers(); renderMapSidebar();
}

// ── Mouse drag (desktop) ──
var _mouseDown = false;
function mouseDragStart(e, id) {
  _dragFromId = id; _dragToId = null; _isDragging = false; _mouseDown = true;
  document.onmousemove = function(ev) {
    if (!_mouseDown) return;
    _isDragging = true;
    var el = document.getElementById('stop-row-' + _dragFromId);
    if (el) el.classList.add('stop-row-dragging');
    var below = document.elementFromPoint(ev.clientX, ev.clientY);
    var targetId = getStopIdFromEl(below);
    if (targetId !== null && targetId !== _dragFromId) {
      _dragToId = targetId;
      highlightDropZone(targetId);
    }
  };
  document.onmouseup = function() {
    document.onmousemove = null; document.onmouseup = null; _mouseDown = false;
    if (_isDragging && _dragFromId !== null && _dragToId !== null) {
      doReorder(_dragFromId, _dragToId);
    }
    highlightDropZone(null);
    var el = document.getElementById('stop-row-' + _dragFromId);
    if (el) el.classList.remove('stop-row-dragging');
    _dragFromId = null; _dragToId = null;
    setTimeout(function(){ _isDragging = false; }, 100);
    renderMapMarkers(); renderMapSidebar();
  };
}

function toggleStopEditMode() {
  _stopEditMode = !_stopEditMode;
  renderMapSidebar();
}

function startEditStop(id) {

    hint.innerHTML = '📍 Tippe auf die Karte um den neuen Standort zu setzen <button onclick="cancelReposition()" style="margin-left:12px;background:rgba(255,255,255,.2);border:none;color:white;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:13px;">Abbrechen</button>';

function moveStopUp(id) {
  var pts = trip().mapPoints || [];
  var i = pts.findIndex(function(p){ return p.id === id; });
  if (i > 0) { var tmp=pts[i]; pts[i]=pts[i-1]; pts[i-1]=tmp; renderMapMarkers(); renderMapSidebar(); }
}

function moveStopDown(id) {
  var pts = trip().mapPoints || [];
  var i = pts.findIndex(function(p){ return p.id === id; });
  if (i >= 0 && i < pts.length-1) { var tmp=pts[i]; pts[i]=pts[i+1]; pts[i+1]=tmp; renderMapMarkers(); renderMapSidebar(); }
}

function startEditHighlight(id) {
  var tr = trip();
  var hl = (tr.mapHighlights||[]).find(function(h){ return h.id === id; });
  if (!hl) return;
  showPrompt('Highlight umbenennen:', hl.name, function(newName) {
    if (newName && newName.trim()) { hl.name = newName.trim(); renderMapMarkers(); renderMapSidebar(); }
  });
}

// ── SIDEBAR ───────────────────────────────────────────────
function renderMapSidebar() {
  var sidebar = document.getElementById('map-sidebar');
  if (!sidebar) return;
  var t = THEMES[curTheme];
  var tr = trip();
  var pts = tr.mapPoints  || [];
  var hls = tr.mapHighlights || [];

  // ── Stops section ──
  var editBtn = '<button onclick="toggleStopEditMode()" style="font-size:12px;padding:3px 10px;border-radius:6px;border:1.5px solid '+t.bdr2+';background:'+(_stopEditMode?t.acc:t.cb)+';color:'+(_stopEditMode?t.acct:t.ct)+';cursor:pointer;">'+(_stopEditMode?'✓ Fertig':'✏️ Bearbeiten')+'</button>';

  var stopsHtml;
  if (pts.length === 0) {
    stopsHtml = '<div style="font-size:13px;color:'+t.cm+';padding:.5rem 0;">Noch keine Stopps. Klick auf die Karte!</div>';
  } else if (!_stopEditMode) {
    // Normal view
    stopsHtml = pts.map(function(p, i) {

function dragStopDrop(e, targetId) {
  e.preventDefault();
  if (_dragStopId === null || _dragStopId === targetId) return;
  var pts = trip().mapPoints;
  var fromIdx = pts.findIndex(function(p){ return p.id === _dragStopId; });
  var toIdx   = pts.findIndex(function(p){ return p.id === targetId; });
  if (fromIdx < 0 || toIdx < 0) return;
  var item = pts.splice(fromIdx, 1)[0];
  pts.splice(toIdx, 0, item);
  renderMapMarkers();
  renderMapSidebar();
  // Animate newly placed rows
  setTimeout(function() {
    document.querySelectorAll('#map-sidebar [id^="stop-row-"]').forEach(function(el) {

  }, 10);
}

var _mapSearchTimer = null;
function mapGoToSug(i){ var s=window._mapSugList&&window._mapSugList[i]; if(s) mapGoTo(parseFloat(s.lat),parseFloat(s.lon),s.name); }
function mapSearchLive(q) {
  window._mapSugList = [];
  clearTimeout(_mapSearchTimer);
  var resultsEl = document.getElementById('map-search-results');
  if (!q || q.length < 2) { if(resultsEl) resultsEl.innerHTML=''; return; }
  _mapSearchTimer = setTimeout(function() {
    var t = THEMES[curTheme];
    if (resultsEl) resultsEl.innerHTML = '<div style="font-size:12px;color:'+t.cm+';padding:4px 0;">Suche...</div>';
    fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q) + '&limit=12&addressdetails=1&accept-language=de&countrycodes=de,at,ch,fr,it,es,gb,us,nl,be,pl,cz,hu,hr,gr,tr,th,ae,mx,au,ca,sg,jp,cn,kr,in,br,za', {
      headers: { 'Accept-Language': 'de', 'User-Agent': 'TrIppy/1.0' }
    })
    .then(function(r){ return r.json(); })
    .then(function(results) {
      if (!resultsEl) return;
      var qLow = q.toLowerCase();
      var cityMap = {};
      results.forEach(function(r) {
        var addr = r.address || {};
        var cityName = addr.city || addr.town || addr.village || addr.municipality || addr.county || r.display_name.split(',')[0];
        cityName = cityName.trim();
        var country = addr.country_code ? addr.country_code.toUpperCase() : '';
        var state = addr.state || '';
        var label = cityName;
        if (state && state !== cityName) label += ', ' + state;
        if (country && country !== 'DE') label += ', ' + country;
        var nameLow = cityName.toLowerCase();
        if (!nameLow.startsWith(qLow) && !nameLow.includes(qLow)) return;
        var key = cityName.toLowerCase();
        if (!cityMap[key] || parseFloat(r.importance||0) > parseFloat(cityMap[key].importance||0)) {
          cityMap[key] = { lat: r.lat, lon: r.lon, label: label, importance: r.importance || 0 };
        }
      });
      var unique = Object.values(cityMap).sort(function(a,b){ return b.importance - a.importance; }).slice(0, 6);
      if (!unique.length) { resultsEl.innerHTML=''; return; }
      var t2 = THEMES[curTheme];
      window._mapSugList = [];
      resultsEl.innerHTML = unique.map(function(entry) {
        window._mapSugList.push({lat: entry.lat, lon: entry.lon, name: entry.label});
        var si = window._mapSugList.length - 1;
        return '<div onclick="mapGoToSug('+si+')" style="font-size:13px;padding:7px 10px;border-radius:7px;cursor:pointer;background:'+t2.hov+';border:1px solid '+t2.bdr+';margin-bottom:4px;color:'+t2.ct+';">'+entry.label+'</div>';
      }).join('');
    })
    .catch(function(){ if(resultsEl) resultsEl.innerHTML=''; });
  }, 350);
}

function savePoll() {
  var q = (document.getElementById('poll-q')||{}).value.trim();
  var opts = Array.from(document.querySelectorAll('.poll-opt')).map(function(i){return i.value.trim();}).filter(Boolean);
  if(!q || opts.length < 2) return;
  var tr = trip(); if(!tr.polls) tr.polls=[]; if(!tr.messages) tr.messages=[];
  var pollId = Date.now();
  var pollType = document.querySelector('input[name="poll-type"]:checked'); var multi = pollType && pollType.value === 'multi';
  var autoEndEl = document.querySelector('input[name="poll-end"]:checked'); 
  var customEnd = (document.getElementById('poll-end-custom') || {}).value || '';
  var durationMs = 0;
  if (autoEndEl) {
    var v = autoEndEl.value;
    if (v === '1h') durationMs = 3600000;
    else if (v === '24h') durationMs = 86400000;
    else if (v === '3d') durationMs = 259200000;
    else if (v === '1w') durationMs = 604800000;
    else if (v === 'custom') {
      var hrs = parseFloat(customEnd);
      if (!isNaN(hrs) && hrs > 0) durationMs = hrs * 3600000;
      else { showToast('Bitte eine gültige Stundenanzahl eingeben (z.B. 2 oder 0.5 für 30 Minuten)', 'error'); return; }
    }
  }
  var endsAt = durationMs > 0 ? Date.now() + durationMs : 0;
  console.log('Poll endsAt:', endsAt, 'duration:', durationMs/60000, 'minutes');
  tr.polls.push({ id:pollId, question:q, multi:multi, options:opts.map(function(l){return{label:l,votes:0,voters:[]};}) , active:true, endsAt:endsAt });
  var now = new Date(); var time = now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
  tr.messages.push({ id:Date.now()+1, type:'poll', pollId:pollId, time:time });
  closeModal();
  // Refresh whichever chat view is currently visible
  if (document.getElementById('chat-overlay') && document.getElementById('chat-overlay').style.display === 'flex') {
    openChatOverlay();
  } else {
    rChat();
  }
}


function renderPollHtml(poll, t, sender) {
  var isActive = poll.active !== false && (poll.endsAt === 0 || Date.now() < poll.endsAt);
  var total = poll.options.reduce(function(s,o){ return s+(o.votes||0); }, 0);
  var myVotes = (poll.voters && poll.voters[sender]) || [];

  var optsHtml = poll.options.map(function(o, i) {

    var row = '<div onclick="'+(isActive?'votePoll('+poll.id+','+i+')':'')+'" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid '+t.bdr+';cursor:'+(isActive?'pointer':'default')+';">'+checkBox+'<div style="flex:1;"><div style="display:flex;justify-content:space-between;font-size:13px;color:'+t.ct+';margin-bottom:3px;"><span>'+o.label+'</span><span style="color:'+t.cm+';font-size:12px;">'+pct+'% ('+o.votes+')</span></div><div style="height:4px;border-radius:2px;background:'+t.hov+';overflow:hidden;"><div style="height:100%;border-radius:2px;background:'+t.acc+';width:'+pct+'%;"></div></div></div></div>';
    return row;
  }).join('');

  var endsInfo = '';
  if (isActive && poll.endsAt > 0) {
    var remaining = poll.endsAt - Date.now();
    if (remaining > 0) {
      var totalMins = Math.floor(remaining / 60000);
      var days = Math.floor(totalMins / 1440);
      var hrs = Math.floor((totalMins % 1440) / 60);
      var mins = totalMins % 60;
      if (days > 0) endsInfo = ' · endet in ' + days + 'd ' + hrs + 'h';
      else if (hrs > 0) endsInfo = ' · endet in ' + hrs + 'h ' + mins + 'min';
      else endsInfo = ' · endet in ' + mins + ' min';
    }
  } else if (!isActive && poll.endsAt > 0 && Date.now() > poll.endsAt) {
    endsInfo = ' · automatisch beendet';
  }

  return '<div id="poll-msg-'+poll.id+'" style="background:'+t.hov+';border:1.5px solid '+(isActive?t.acc:t.bdr)+';border-radius:12px;padding:14px;margin-bottom:10px;">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'+
    '<div style="font-size:12px;font-weight:600;color:'+t.acc+';">📊 Abstimmung'+(poll.multi?' · Mehrfach':'')+'</div>'+
    (isActive?'<button onclick="closePoll('+poll.id+')" style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid '+t.bdr2+';background:none;color:'+t.cm+';cursor:pointer;font-family:DM Sans,sans-serif;">Beenden</button>':'<span style="font-size:11px;color:'+t.cm+';">✓ Beendet</span>')+
    '</div>'+

    optsHtml+
    '<div style="font-size:11px;color:'+t.cm+';margin-top:8px;">'+total+' Stimme'+(total===1?'':'n')+endsInfo+(isActive&&!poll.multi?' · Tippen zum Ändern':'')+'</div>'+
    '</div>';
}

function votePoll(pollId, optIdx) {
  var tr = trip();
  var poll = (tr.polls||[]).find(function(p){ return p.id === pollId; });
  if (!poll || !poll.options[optIdx]) return;
  var isActive = poll.active !== false && (poll.endsAt === 0 || Date.now() < poll.endsAt);
  if (!isActive) { showToast('Diese Umfrage ist bereits beendet.', 'error'); return; }

  var sender = getPollSender();
  if (!poll.voters) poll.voters = {};
  var myVotes = poll.voters[sender] || [];

  if (!poll.multi) {
    // Single: toggle – if already voted this option, remove; else move vote
    var prevIdx = myVotes.length > 0 ? myVotes[0] : -1;
    if (prevIdx === optIdx) {
      // Remove vote
      poll.options[prevIdx].votes = Math.max(0, (poll.options[prevIdx].votes||0) - 1);
      poll.voters[sender] = [];
    } else {
      // Move vote from prev to new
      if (prevIdx >= 0 && poll.options[prevIdx]) {
        poll.options[prevIdx].votes = Math.max(0, (poll.options[prevIdx].votes||0) - 1);
      }
      poll.options[optIdx].votes = (poll.options[optIdx].votes||0) + 1;
      poll.voters[sender] = [optIdx];
    }
  } else {
    // Multi: toggle this option
    var existIdx = myVotes.indexOf(optIdx);
    if (existIdx >= 0) {
      // Remove this vote
      poll.options[optIdx].votes = Math.max(0, (poll.options[optIdx].votes||0) - 1);
      myVotes.splice(existIdx, 1);
      poll.voters[sender] = myVotes;
    } else {
      poll.options[optIdx].votes = (poll.options[optIdx].votes||0) + 1;
      poll.voters[sender] = myVotes.concat([optIdx]);
    }
  }
  updatePollDisplay(pollId);
}

function updatePollDisplay(pollId) {
  var tr = trip();
  var poll = (tr.polls||[]).find(function(p){ return p.id === pollId; });
  if (!poll) return;
  var t = THEMES[curTheme];
  var sender = getPollSender();

  // Check if poll auto-expired
  if (poll.active && poll.endsAt > 0 && Date.now() > poll.endsAt) {
    poll.active = false;
  }

  var newHtml = renderPollHtml(poll, t, sender);
  // Update ALL poll elements with this id (could be in chat page + overlay)
  var els = document.querySelectorAll('#poll-msg-' + pollId);
  if (els.length === 0) {
    // Element not in DOM yet - chat might need refresh
    if (document.getElementById('chat-overlay') && document.getElementById('chat-overlay').style.display === 'flex') {
      openChatOverlay();
    } else if (document.getElementById('chat-messages')) {
      rChat();
    }
    return;
  }
  Array.from(els).forEach(function(el) {
    var tmp = document.createElement('div');
    tmp.innerHTML = newHtml;
    var newEl = tmp.firstChild;
    if (newEl) {
      var parent = el.parentNode;
      var scrollTop = parent ? parent.scrollTop : 0;
      parent.replaceChild(newEl, el);
      if (parent) parent.scrollTop = scrollTop;
    }
  });
  renderActivePollsBanner();
}

var _weatherAutocompleteTimer = null;
function weatherAutocomplete(q) {
  clearTimeout(_weatherAutocompleteTimer);
  var sug = document.getElementById('weather-suggestions');
  if (!sug) return;
  if (!q || q.length < 2) { sug.innerHTML = ''; return; }
  _weatherAutocompleteTimer = setTimeout(function() {
    fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q) + '&limit=12&addressdetails=1&accept-language=de&countrycodes=de,at,ch,fr,it,es,gb,us,nl,be,pl,cz,hu,hr,gr,tr,th,ae,mx,au,ca,sg,jp,cn,kr,in,br,za', {
      headers: { 'Accept-Language': 'de', 'User-Agent': 'TrIppy/1.0' }
    })
    .then(function(r){ return r.json(); })
    .then(function(results) {
      if (!sug) return;
      var t = THEMES[curTheme];
      var qLow = q.toLowerCase();
      var cityMap = {};
      results.forEach(function(r) {
        var addr = r.address || {};
        var cityName = addr.city || addr.town || addr.village || addr.municipality || addr.county || r.display_name.split(',')[0];
        cityName = cityName.trim();
        var country = addr.country_code ? addr.country_code.toUpperCase() : '';
        var state = addr.state || '';
        var label = cityName;
        if (state && state !== cityName) label += ', ' + state;
        if (country && country !== 'DE') label += ', ' + country;
        var nameLow = cityName.toLowerCase();
        if (!nameLow.startsWith(qLow) && !nameLow.includes(qLow)) return;
        var key = cityName.toLowerCase();
        if (!cityMap[key] || parseFloat(r.importance||0) > parseFloat(cityMap[key].importance||0)) {
          cityMap[key] = { label: label, importance: r.importance || 0 };
        }
      });
      var unique = Object.values(cityMap).sort(function(a,b){ return b.importance - a.importance; }).slice(0, 6);
      if (!unique.length) { sug.innerHTML = ''; return; }
      window._weatherSugList = unique.map(function(e){ return e.label; });
      sug.innerHTML = window._weatherSugList.map(function(name, idx2) {
        return '<div onclick="selectWeatherSuggestion(window._weatherSugList['+idx2+'])" ' +
          'style="padding:8px 10px;font-size:13px;color:'+t.ct+';cursor:pointer;border-radius:7px;margin-bottom:2px;background:'+t.hov+';">'+name+'</div>';
      }).join('');
    })
    .catch(function(){ });
  }, 350);
}
