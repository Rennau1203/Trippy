  })
  .then(function(r){ return r.json(); })
  .then(function(geo) {
    if (!geo.length) throw new Error('Stadt nicht gefunden');
    var lat = parseFloat(geo[0].lat);
    var lon = parseFloat(geo[0].lon);
    var displayName = geo[0].display_name.split(',').slice(0,2).join(', ');

    // Step 2: Fetch weather from Open-Meteo
    var url = 'https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+
      '&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m,apparent_temperature,precipitation'+
      '&hourly=temperature_2m,weathercode,precipitation_probability'+
      '&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,sunrise,sunset,uv_index_max'+
      '&timezone=auto&forecast_days=14';

    window._lastWeatherLat = lat; window._lastWeatherLon = lon; window._lastWeatherCity = displayName;
    return fetch(url).then(function(r){ return r.json(); }).then(function(w) {
      renderWeather(w, displayName, t);
    });
  })
  .catch(function(err) {
    var el = document.getElementById('weather-result');
    if (el) el.innerHTML = '<div class="card" style="padding:1rem;color:#dc2626;font-size:13px;">❌ ' + err.message + '</div>';
  });
}


function renderWeather(w, cityName, t) {
  var el = document.getElementById('weather-result');
  if (!el) return;
  var cur = w.current, daily = w.daily, hourly = w.hourly;
  var code = cur.weathercode;
  var emoji = (WMO_CODES[code]||'🌡').split(' ')[0];
  var desc  = (WMO_CODES[code]||'Unbekannt').split(' ').slice(1).join(' ');

  // ── Current ──
  var sr = daily.sunrise&&daily.sunrise[0] ? (daily.sunrise[0].split('T')[1]||daily.sunrise[0]).slice(0,5) : '';
  var ss = daily.sunset&&daily.sunset[0]   ? (daily.sunset[0].split('T')[1]||daily.sunset[0]).slice(0,5)   : '';
  var uv0 = daily.uv_index_max ? daily.uv_index_max[0] : null;

  var currentHtml =
    '<div class="card" style="padding:1.25rem;margin-bottom:.75rem;">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">' +
    '<div style="font-size:12px;font-weight:600;color:'+t.cm+';text-transform:uppercase;letter-spacing:.05em;">'+cityName+'</div>' +
    '<button onclick="openRadar()" style="font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid '+t.bdr2+';background:none;color:'+t.acc+';cursor:pointer;font-weight:500;font-family:DM Sans,sans-serif;">🌧 Regenradar ↗</button>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:16px;margin-bottom:1rem;">' +
    '<div style="font-size:52px;line-height:1;">'+emoji+'</div>' +
    '<div><div style="font-size:40px;font-weight:700;color:'+t.ct+';line-height:1;">'+Math.round(cur.temperature_2m)+'°<span style="font-size:20px;color:'+t.cm+';">C</span></div>' +
    '<div style="font-size:13px;color:'+t.cm+';margin-top:3px;">'+desc+'</div>' +
    '<div style="font-size:12px;color:'+t.cm+';margin-top:2px;">Gefühlt: '+Math.round(cur.apparent_temperature)+'°C</div></div></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;">' +
    statBox('💨', Math.round(cur.windspeed_10m)+' km/h', 'Wind', t) +
    statBox('💧', cur.relativehumidity_2m+'%', 'Feuchte', t) +
    statBox('🌧', cur.precipitation+' mm', 'Heute', t) +
    '</div>' +
    (sr ? '<div style="display:flex;gap:16px;padding-top:10px;border-top:1px solid '+t.bdr+';">' +
    '<span style="font-size:12px;color:'+t.cm+';">🌅 '+sr+'</span>' +
    '<span style="font-size:12px;color:'+t.cm+';">🌇 '+ss+'</span>' +
    (uv0!==null?'<span style="font-size:12px;color:'+t.cm+';">☀️ UV '+uv0+'</span>':'') +
    '</div>' : '') +
    '</div>';

  // ── Hourly ──
  var hourlyHtml = '';
  if (hourly && hourly.time && hourly.time.length) {
    var now = new Date(); var startIdx = 0;
    for (var h=0;h<hourly.time.length;h++) { if (new Date(hourly.time[h])>=now){startIdx=h;break;} }
    var items = '';
    for (var hi=startIdx; hi<Math.min(startIdx+25,hourly.time.length); hi++) {
      var hLabel = new Date(hourly.time[hi]).getHours()+':00';
      var hTemp  = Math.round(hourly.temperature_2m[hi]);
      var hEmoji = (WMO_CODES[hourly.weathercode[hi]]||'🌡').split(' ')[0];
      var hPop   = hourly.precipitation_probability ? hourly.precipitation_probability[hi] : null;
      var isNow  = hi===startIdx;
      items += '<div style="display:flex;flex-direction:column;align-items:center;gap:3px;min-width:54px;padding:8px 4px;border-radius:10px;'+(isNow?'background:'+t.acc+';':'')+'">' +
        '<div style="font-size:11px;color:'+(isNow?t.acct:t.cm)+';">'+hLabel+'</div>' +
        '<div style="font-size:18px;">'+hEmoji+'</div>' +
        '<div style="font-size:13px;font-weight:600;color:'+(isNow?t.acct:t.ct)+';">'+hTemp+'°</div>' +
        (hPop!==null?'<div style="font-size:10px;color:'+(isNow?t.acct:t.cm)+';">💧'+hPop+'%</div>':'') +
        '</div>';
    }
    hourlyHtml = '<div class="card" style="padding:1rem;margin-bottom:.75rem;">' +
      '<div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:'+t.cm+';margin-bottom:10px;">Stündliche Vorhersage</div>' +
      '<div style="display:flex;overflow-x:auto;gap:2px;padding-bottom:4px;">'+items+'</div></div>';
  }

  // ── 14-day: WetterOnline-style dot chart + toggle ──
  var n = Math.min(14, daily.time.length);
  var maxTemps = daily.temperature_2m_max.slice(0,n);
  var minTemps = daily.temperature_2m_min.slice(0,n);
  var allTemps = maxTemps.concat(minTemps);
  var chartMaxT = Math.max.apply(null, allTemps);
  var chartMinT = Math.min.apply(null, allTemps);
  var chartRange = chartMaxT - chartMinT || 1;

  var dotAreaH = 100; // px height for dot area — will use overflow:visible so labels never clip
  var days7 = ['So','Mo','Di','Mi','Do','Fr','Sa'];

  function tempToY(temp) {
    // y=18 = top (max label space), y=dotAreaH-18 = bottom (min label space)
    return 18 + ((chartMaxT - temp) / chartRange) * (dotAreaH - 36);
  }

  // Build column-per-day layout
  var dayColumns = '';
  for (var di = 0; di < n; di++) {
    var fd = new Date(daily.time[di]);
    var dayShort = di===0?'Heu':di===1?'Mor':days7[fd.getDay()];
    var dateStr = fd.getDate()+'.'+(fd.getMonth()+1)+'.';
    var tMax = Math.round(maxTemps[di]);
    var tMin = Math.round(minTemps[di]);
    var dcode = daily.weathercode[di];
    var dem = (WMO_CODES[dcode]||'🌡').split(' ')[0];
    var rain = daily.precipitation_sum[di] || 0;
    var yMax = tempToY(maxTemps[di]);
    var yMin = tempToY(minTemps[di]);
    // Color max by temperature
    var maxColor = tMax >= 35 ? '#b91c1c' : tMax >= 30 ? '#dc2626' : tMax >= 20 ? '#f97316' : tMax >= 10 ? '#eab308' : '#3b82f6';

    dayColumns += '<div style="display:flex;flex-direction:column;align-items:center;min-width:48px;flex:1;">' +
      '<div style="font-size:11px;font-weight:600;color:'+t.cm+';margin-bottom:1px;">'+dayShort+'</div>' +
      '<div style="font-size:9px;color:'+t.cm+';margin-bottom:4px;">'+dateStr+'</div>' +
      '<div style="font-size:14px;margin-bottom:4px;">'+dem+'</div>' +
      '<svg viewBox="0 0 40 '+dotAreaH+'" style="width:40px;height:'+dotAreaH+'px;overflow:visible;">' +
      '<line x1="20" y1="'+yMax.toFixed(1)+'" x2="20" y2="'+yMin.toFixed(1)+'" stroke="'+t.bdr2+'" stroke-width="2" stroke-linecap="round"/>' +
      '<circle cx="20" cy="'+yMax.toFixed(1)+'" r="5" fill="'+maxColor+'"/>' +
      '<text x="20" y="'+(yMax-9).toFixed(1)+'" text-anchor="middle" font-size="10" font-weight="700" fill="'+maxColor+'">'+tMax+'°</text>' +
      '<circle cx="20" cy="'+yMin.toFixed(1)+'" r="4" fill="'+t.cb+'" stroke="#3b82f6" stroke-width="2"/>' +
      '<text x="20" y="'+(yMin+17).toFixed(1)+'" text-anchor="middle" font-size="10" fill="#3b82f6">'+tMin+'°</text>' +
      '</svg>' +
      (rain > 0 ? '<div style="font-size:9px;color:#3b82f6;margin-top:2px;">'+rain.toFixed(0)+'mm</div>' : '<div style="height:14px;"></div>') +
      '</div>';
  }

  var forecastHtml = '<div class="card" style="padding:1rem;margin-bottom:.75rem;">' +
    '<div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:'+t.cm+';margin-bottom:10px;">14-Tage-Vorhersage</div>' +
    '<div style="width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 0;"><div style="display:flex;gap:2px;min-width:0;">'+dayColumns+'</div></div>' +
    '</div>';

  // ── Extra info cards ──
  var extraHtml = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem;">';
  var uv0 = daily.uv_index_max ? daily.uv_index_max[0] : null;
  if (uv0 !== null) {
    var uvColor = uv0<=2?'#22c55e':uv0<=5?'#eab308':uv0<=7?'#f97316':uv0<=10?'#dc2626':'#9333ea';
    var uvLabel = uv0<=2?'Niedrig':uv0<=5?'Mäßig':uv0<=7?'Hoch':uv0<=10?'Sehr hoch':'Extrem';
    extraHtml += '<div class="card" style="padding:.875rem;">' +
      '<div style="font-size:11px;color:'+t.cm+';font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">☀️ UV-Index</div>' +
      '<div style="font-size:28px;font-weight:700;color:'+uvColor+';">'+uv0+'</div>' +
      '<div style="font-size:12px;color:'+uvColor+';font-weight:500;margin-bottom:8px;">'+uvLabel+'</div>' +
      '<div style="height:6px;border-radius:3px;background:'+t.hov+';overflow:hidden;">' +
      '<div style="height:100%;border-radius:3px;background:'+uvColor+';width:'+Math.min(uv0/11*100,100).toFixed(0)+'%;"></div></div>' +
      '<div style="font-size:10px;color:'+t.cm+';margin-top:4px;">'+(uv0>=3?'Sonnenschutz empfohlen':'Kein Schutz nötig')+'</div></div>';
  }
  var windSpd = Math.round(cur.windspeed_10m);
  var windColor = windSpd < 20 ? '#22c55e' : windSpd < 40 ? '#eab308' : windSpd < 60 ? '#f97316' : '#dc2626';
  var windLabel = windSpd < 20 ? 'Schwach' : windSpd < 40 ? 'Mäßig' : windSpd < 60 ? 'Stark' : 'Sturm';
  extraHtml += '<div class="card" style="padding:.875rem;">' +
    '<div style="font-size:11px;color:'+t.cm+';font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">💨 Wind</div>' +
    '<div style="font-size:28px;font-weight:700;color:'+windColor+';">'+windSpd+'</div>' +
    '<div style="font-size:12px;color:'+windColor+';font-weight:500;">km/h · '+windLabel+'</div>' +
    '<div style="height:6px;border-radius:3px;background:'+t.hov+';margin-top:8px;overflow:hidden;">' +
    '<div style="height:100%;border-radius:3px;background:'+windColor+';width:'+Math.min(windSpd/80*100,100).toFixed(0)+'%;"></div></div>' +
    '<div style="font-size:10px;color:'+t.cm+';margin-top:4px;">Max: '+(daily.windspeed_10m_max?Math.round(daily.windspeed_10m_max[0])+' km/h':'-')+'</div></div>';
  extraHtml += '<div class="card" style="padding:.875rem;">' +
    '<div style="font-size:11px;color:'+t.cm+';font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">💧 Feuchte</div>' +
    '<div style="font-size:28px;font-weight:700;color:'+t.ct+';">'+cur.relativehumidity_2m+'%</div>' +
    '<div style="height:6px;border-radius:3px;background:'+t.hov+';margin-top:8px;overflow:hidden;">' +
    '<div style="height:100%;border-radius:3px;background:#3b82f6;width:'+cur.relativehumidity_2m+'%;"></div></div>' +
    '<div style="font-size:10px;color:'+t.cm+';margin-top:4px;">'+(cur.relativehumidity_2m>70?'Schwül':'Angenehm')+'</div></div>';
  var rainToday = daily.precipitation_sum ? daily.precipitation_sum[0]||0 : 0;
  extraHtml += '<div class="card" style="padding:.875rem;">' +
    '<div style="font-size:11px;color:'+t.cm+';font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">🌧 Niederschlag</div>' +
    '<div style="font-size:28px;font-weight:700;color:'+t.ct+';">'+rainToday.toFixed(1)+'</div>' +
    '<div style="font-size:12px;color:'+t.cm+';">mm heute</div>' +
    '<div style="font-size:10px;color:'+t.cm+';margin-top:4px;">Morgen: '+((daily.precipitation_sum&&daily.precipitation_sum[1])||0).toFixed(1)+' mm</div></div>';
  extraHtml += '</div>';

  var pollenNote = '<div class="card" style="padding:.875rem;margin-bottom:.75rem;">' +
    '<div style="font-size:11px;color:'+t.cm+';font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">🌿 Pollenflug</div>' +
    '<div style="font-size:13px;color:'+t.cm+';margin-bottom:10px;">Aktuelle Pollenbelastung – regional von Messstationen erfasst.</div>' +
    '<button onclick="openPollenDWD()" style="width:100%;padding:11px;border-radius:10px;border:1.5px solid '+t.bdr2+';background:'+t.hov+';color:'+t.ct+';cursor:pointer;font-size:14px;font-weight:500;font-family:DM Sans,sans-serif;">🌿 Pollenflug beim DWD öffnen ↗</button>' +
    '</div>';

  el.innerHTML = currentHtml + hourlyHtml + forecastHtml + extraHtml + pollenNote;

}

function curBaseChanged() {
  var el = document.getElementById('cur-from');
  if (el) _curBase = el.value;
  fetchRates();
}

function curTargetChanged() {
  var el = document.getElementById('cur-to');
  if (el) _curTarget = el.value;
  updateConversion();
  renderRates();
}

function swapCurrencies() {
  var tmp = _curBase; _curBase = _curTarget; _curTarget = tmp;
  var fromEl = document.getElementById('cur-from');
  var toEl = document.getElementById('cur-to');
  if (fromEl) fromEl.value = _curBase;
  if (toEl) toEl.value = _curTarget;
  fetchRates();
}

function toggleShowAllRates() {
  _curShowAll = !_curShowAll;
  renderRates();
  var btn = document.getElementById('cur-show-more');
  if (btn) btn.textContent = _curShowAll ? 'Weniger anzeigen ▴' : 'Alle Währungen anzeigen ▾';
}

function fetchRates() {
  var t = THEMES[curTheme];
  fetch('https://api.frankfurter.app/latest?base=' + _curBase)
    .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
    .then(function(data) {
      _curRates = data.rates; _curRates[_curBase] = 1;
      var on = document.getElementById('cur-offline-note'); if(on) on.style.display='none';
      renderRates(); updateConversion();
    })
    .catch(function() {
      // Fallback
      if (_curBase === 'EUR') { _curRates = Object.assign({}, FALLBACK_EUR_RATES); }
      else {
        var baseRate = FALLBACK_EUR_RATES[_curBase] || 1;
        _curRates = {};
        Object.keys(FALLBACK_EUR_RATES).forEach(function(k){ _curRates[k] = FALLBACK_EUR_RATES[k] / baseRate; });
      }
      _curRates[_curBase] = 1;
      renderRates(); updateConversion();
      var offlineNote = document.getElementById('cur-offline-note');
      if (offlineNote) offlineNote.style.display = 'block';
    });
}

function renderRates() {
  var t = THEMES[curTheme];
  var el = document.getElementById('cur-rates-list');
  if (!el || !_curRates) return;
  var list = _curShowAll ? ALL_CURRENCIES : ALL_CURRENCIES.filter(function(c){ return TOP_CURRENCIES.indexOf(c.code) >= 0; });
  el.innerHTML = list
    .filter(function(c){ return c.code !== _curBase && _curRates[c.code]; })
    .map(function(cur) {
      var rate = _curRates[cur.code];
      var rateStr = rate >= 1000 ? rate.toFixed(0) : rate >= 100 ? rate.toFixed(1) : rate >= 10 ? rate.toFixed(2) : rate.toFixed(4);
      var isTarget = cur.code === _curTarget;
      return '<div style="display:flex;align-items:center;padding:7px 0;border-bottom:1px solid '+t.bdr+';cursor:pointer;'+(isTarget?'background:'+t.hov+';margin:0 -4px;padding:7px 4px;border-radius:6px;':'')+'" onclick="setTargetCur(\''+cur.code+'\')">' +
        '<div style="font-size:18px;margin-right:8px;">'+cur.flag+'</div>' +
        '<div style="flex:1;">' +
        '<div style="font-size:13px;font-weight:'+(isTarget?'600':'400')+';color:'+t.ct+';">'+cur.code+'</div>' +
        '<div style="font-size:11px;color:'+t.cm+';">'+cur.name+'</div>' +
        '</div>' +
        '<div style="text-align:right;">' +
        '<div style="font-size:14px;font-weight:600;color:'+(isTarget?t.acc:t.ct)+';">'+rateStr+'</div>' +
        '</div></div>';
    }).join('');
  // Update header
  var hdr = document.querySelector('#pg-currency .card:last-child div:first-child div');
  if (hdr) hdr.textContent = 'Aktuelle Kurse (1 '+_curBase+')';
}

function setTargetCur(code) {
  _curTarget = code;
  var el = document.getElementById('cur-to');
  if (el) el.value = code;
  updateConversion();
  renderRates();
}

function updateConversion() {
  if (!_curRates) return;
  var amtEl = document.getElementById('cur-amount');
  var amt = amtEl ? parseFloat(amtEl.value) : 0;
  var res = document.getElementById('cur-result-main');
  if (!res) return;
  if (isNaN(amt) || amt === 0) { res.textContent = '—'; return; }
  var rate = _curRates[_curTarget] || 1;
  var converted = amt * rate;
  var cur = ALL_CURRENCIES.find(function(c){ return c.code === _curTarget; });
  var flag = cur ? cur.flag : '';
  var str = converted >= 10000 ? converted.toFixed(0) : converted >= 100 ? converted.toFixed(2) : converted.toFixed(4);
  res.textContent = flag + ' ' + str + ' ' + _curTarget;
}


function openPollenDWD() {
  window.open('https://www.dwd.de/DE/leistungen/gefahrenindizespollen/gefahrenindexpollen.html', '_blank');
}

function openRadar() {
  var lat = window._lastWeatherLat || 48.1351;
  var lon = window._lastWeatherLon || 11.5820;
  var cityName = window._lastWeatherCity || 'Radar';
  var t = THEMES[curTheme];

  // Build radar modal directly in the app
  var existing = document.getElementById('radar-modal');
  if (existing) existing.remove();

  var modal = document.createElement('div');
  modal.id = 'radar-modal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;background:'+t.cb+';';
  modal.innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid '+t.bdr+';background:'+t.cb+';flex-shrink:0;">' +
      '<button onclick="document.getElementById(\'radar-modal\').remove();if(window._radarMap){window._radarMap.remove();window._radarMap=null;}" style="background:none;border:none;font-size:22px;cursor:pointer;color:'+t.ct+';padding:0;line-height:1;">←</button>' +
      '<div>' +
        '<div style="font-size:15px;font-weight:700;color:'+t.ct+';">🌧 Regenradar</div>' +
        '<div style="font-size:11px;color:'+t.cm+';">'+cityName+'</div>' +
      '</div>' +
      '<div style="margin-left:auto;font-size:11px;color:'+t.cm+';">Quelle: RainViewer</div>' +
    '</div>' +
    '<div id="radar-map" style="flex:1;width:100%;"></div>' +
    '<div style="padding:8px 16px;background:'+t.cb+';border-top:1px solid '+t.bdr+';display:flex;align-items:center;gap:8px;flex-shrink:0;">' +
      '<div id="radar-time" style="font-size:12px;color:'+t.cm+';flex:1;">Lade Radardaten…</div>' +
      '<button onclick="radarPrev()" style="padding:5px 12px;border-radius:8px;border:1.5px solid '+t.bdr2+';background:none;color:'+t.ct+';cursor:pointer;font-size:13px;">◀</button>' +
      '<button onclick="radarPlay()" id="radar-play-btn" style="padding:5px 14px;border-radius:8px;border:1.5px solid '+t.acc+';background:'+t.acc+';color:#fff;cursor:pointer;font-size:13px;font-weight:600;">▶ Play</button>' +
      '<button onclick="radarNext()" style="padding:5px 12px;border-radius:8px;border:1.5px solid '+t.bdr2+';background:none;color:'+t.ct+';cursor:pointer;font-size:13px;">▶</button>' +
    '</div>';

  document.body.appendChild(modal);

  // Init Leaflet map in radar modal
  setTimeout(function() {
    var map = L.map('radar-map', { zoomControl: true, attributionControl: false }).setView([lat, lon], 7);
    window._radarMap = map;
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 18
    }).addTo(map);
    // Mark city center
    L.circleMarker([lat, lon], { radius: 6, color: '#fff', weight: 2, fillColor: t.acc, fillOpacity: 1 }).addTo(map);

    // Load RainViewer API
    window._radarFrames = [];
    window._radarIdx = 0;
    window._radarLayer = null;
    window._radarPlaying = false;
    window._radarTimer = null;

    fetch('https://api.rainviewer.com/public/weather-maps.json')
      .then(function(r){ return r.json(); })
      .then(function(data) {
        var frames = (data.radar && data.radar.past) ? data.radar.past : [];
        if (data.radar && data.radar.nowcast) frames = frames.concat(data.radar.nowcast);
        window._radarFrames = frames;
        window._radarApiHost = data.host;
        window._radarIdx = frames.length - 1;
        radarShowFrame(window._radarIdx, map);
      })
      .catch(function(){ document.getElementById('radar-time').textContent = 'Radardaten nicht verfügbar'; });
  }, 100);
}

function radarShowFrame(idx, mapObj) {
  var map = mapObj || window._radarMap;
  if (!map || !window._radarFrames.length) return;
  var frame = window._radarFrames[idx];
  if (!frame) return;
  if (window._radarLayer) { map.removeLayer(window._radarLayer); }
  window._radarLayer = L.tileLayer(window._radarApiHost + frame.path + '/256/{z}/{x}/{y}/2/1_1.png', {
    opacity: 0.7, maxZoom: 18
  }).addTo(map);
  var d = new Date(frame.time * 1000);
  var timeStr = d.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'}) + ' ' +
    d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  var isNow = idx === (window._radarFrames.filter(function(f,i){ return i < window._radarFrames.length; }).length - 1);
  var el = document.getElementById('radar-time');
  if (el) el.textContent = timeStr + (idx >= window._radarFrames.length - 2 ? ' (Vorhersage)' : '');
}

function radarNext() {
  if (!window._radarFrames.length) return;
  window._radarIdx = (window._radarIdx + 1) % window._radarFrames.length;
  radarShowFrame(window._radarIdx);
}

function radarPrev() {
  if (!window._radarFrames.length) return;
  window._radarIdx = (window._radarIdx - 1 + window._radarFrames.length) % window._radarFrames.length;
  radarShowFrame(window._radarIdx);
}

function radarPlay() {
  if (window._radarPlaying) {
    clearInterval(window._radarTimer);
    window._radarPlaying = false;
    var btn = document.getElementById('radar-play-btn');
    if (btn) btn.textContent = '▶ Play';
  } else {
    window._radarPlaying = true;
    var btn2 = document.getElementById('radar-play-btn');
    if (btn2) btn2.textContent = '⏸ Pause';
    window._radarTimer = setInterval(function() {
      if (!document.getElementById('radar-modal')) { clearInterval(window._radarTimer); return; }
      radarNext();
    }, 600);
  }
}

function curBaseChanged() { var el=document.getElementById('cur-from'); if(el) _curBase=el.value; fetchRates(); }
function curTargetChanged() { var el=document.getElementById('cur-to'); if(el) _curTarget=el.value; updateConversion(); renderRates(); }
function swapCurrencies() { var tmp=_curBase; _curBase=_curTarget; _curTarget=tmp; var f=document.getElementById('cur-from'),t2=document.getElementById('cur-to'); if(f)f.value=_curBase; if(t2)t2.value=_curTarget; fetchRates(); }

function setTargetCur(code) { _curTarget=code; var el=document.getElementById('cur-to'); if(el)el.value=code; updateConversion(); renderRates(); }

function fetchRates() {
  fetch('https://api.frankfurter.app/latest?base='+_curBase)
    .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
    .then(function(data) {
      _curRates=data.rates; _curRates[_curBase]=1;
      var n=document.getElementById('cur-offline-note'); if(n) n.style.display='none';
      renderRates(); updateConversion();
    })
    .catch(function() {
      if(_curBase==='EUR') { _curRates=Object.assign({},FALLBACK_EUR_RATES); }
      else { var br=FALLBACK_EUR_RATES[_curBase]||1; _curRates={}; Object.keys(FALLBACK_EUR_RATES).forEach(function(k){_curRates[k]=FALLBACK_EUR_RATES[k]/br;}); }
      _curRates[_curBase]=1;
      renderRates(); updateConversion();
      var n=document.getElementById('cur-offline-note'); if(n){n.style.display='block';n.textContent='⚠️ Offline-Näherungswerte – Live-Kurse nicht verfügbar';}
    });
}

function renderRates() {
  var t=THEMES[curTheme], el=document.getElementById('cur-rates-list');
  if(!el||!_curRates) return;
  var list=_curShowAll?ALL_CURRENCIES:ALL_CURRENCIES.filter(function(c){return TOP_CURRENCIES.indexOf(c.code)>=0;});
  el.innerHTML=list.filter(function(c){return c.code!==_curBase&&_curRates[c.code];}).map(function(cur){
    var rate=_curRates[cur.code];
    var rs=rate>=1000?rate.toFixed(0):rate>=100?rate.toFixed(1):rate>=10?rate.toFixed(2):rate.toFixed(4);
    var isTgt=cur.code===_curTarget;
    return '<div style="display:flex;align-items:center;padding:7px 0;border-bottom:1px solid '+t.bdr+';cursor:pointer;"'+
      ' onclick="setTargetCur(\''+cur.code+'\')">' +
      '<div style="font-size:18px;margin-right:8px;">'+cur.flag+'</div>' +
      '<div style="flex:1;"><div style="font-size:13px;font-weight:'+(isTgt?'600':'400')+';color:'+t.ct+';">'+cur.code+'</div>' +
      '<div style="font-size:11px;color:'+t.cm+';">'+cur.name+'</div></div>' +
      '<div style="font-size:14px;font-weight:600;color:'+(isTgt?t.acc:t.ct)+';">'+rs+'</div></div>';
  }).join('');
}

function updateConversion() {
  if(!_curRates) return;
  var amtEl=document.getElementById('cur-amount');
  var amt=amtEl?parseFloat(amtEl.value):0;
  var res=document.getElementById('cur-result-main');
  if(!res) return;
  if(isNaN(amt)||amt===0){res.textContent='—';return;}
  var rate=_curRates[_curTarget]||1;
  var converted=amt*rate;
  var cur=ALL_CURRENCIES.find(function(c){return c.code===_curTarget;});
  var flag=cur?cur.flag:'';
  var str=converted>=10000?converted.toFixed(0):converted>=100?converted.toFixed(2):converted.toFixed(4);
  res.textContent=flag+' '+str+' '+_curTarget;
}

      '</div>' +
    '</div>';

  document.body.appendChild(modal);

  var input = document.getElementById('trippy-prompt-input');
  input.focus();
  input.select();

  var close = function() { modal.remove(); };

  document.getElementById('trippy-prompt-cancel').onclick = close;
  modal.onclick = function(e) { if (e.target === modal) close(); };

  var confirm = function() {
    var val = input.value.trim();
    close();
    onConfirm(val || null);
  };
  document.getElementById('trippy-prompt-ok').onclick = confirm;
  input.onkeydown = function(e) {
    if (e.key === 'Enter') confirm();
    if (e.key === 'Escape') close();
  };
}

  var toast = document.createElement('div');
  toast.id = 'trippy-toast';
  toast.style.cssText = [
    'position:fixed',
    'bottom:80px',
    'left:50%',
    'transform:translateX(-50%) translateY(20px)',
    'background:' + t.cb,
    'color:' + t.ct,
    'border:1.5px solid ' + borderColor,
    'border-radius:12px',
    'padding:11px 18px',
    'font-size:14px',
    'font-family:DM Sans,sans-serif',
    'font-weight:500',
    'box-shadow:0 4px 20px rgba(0,0,0,0.18)',
    'z-index:99999',
    'display:flex',
    'align-items:center',
    'gap:8px',
    'max-width:320px',
    'width:calc(100% - 40px)',
    'opacity:0',
    'transition:all 0.25s ease',
    'pointer-events:none'
  ].join(';');
  toast.innerHTML = '<span style="font-size:16px;">'+icon+'</span><span>'+msg+'</span>';
  document.body.appendChild(toast);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      toast.style.opacity = '1';
      toast.style.transform = 'translateX(-50%) translateY(0)';
    });
  });
  setTimeout(function() {
    if (!toast.parentNode) return;
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(10px)';
    setTimeout(function() { if (toast.parentNode) toast.remove(); }, 300);
  }, 3000);
}

<script>
(function() {

  var _currentTrip = null;
  var _currentRole = null;
  var _tripMembers = [];

  function waitForSupabase(cb) {
    if (typeof supabase !== 'undefined') { cb(); return; }
    var t = setInterval(function() {
      if (typeof supabase !== 'undefined') { clearInterval(t); cb(); }
    }, 50);
  }

  // ── UI helpers ─────────────────────────────────────────────────────
  function setMsg(text, color) {
    var el = document.getElementById('auth-msg');
    if (el) { el.textContent = text; el.style.color = color || '#6a6a66'; }
  }

  window.authTab = function(tab) {
    var fl = document.getElementById('form-login');
    var fr = document.getElementById('form-register');
    var ac = document.getElementById('auth-card');
    var jc = document.getElementById('join-card');

    ac.style.display = 'block'; jc.style.display = 'none';
    fl.style.display = tab === 'login' ? 'block' : 'none';

    tr2.style.fontWeight = tab === 'register' ? '500' : '400';

    if (app) app.style.display = 'block';
    var fab = document.getElementById('chat-fab');
    if (fab) fab.style.display = 'flex';

  // ── Boot app after login ───────────────────────────────────────────
  async function bootApp(user) {
    _currentUser = user;
    window._currentUser = user;
    setMsg('Lade Profil...', '#6a6a66');

    // Load or create profile
    var pr = await _sb.from('profiles').select('*').eq('id', user.id).single();
    if (pr.data) {
      window._currentProfile = pr.data;
    } else {
      var name = (user.user_metadata && user.user_metadata.display_name) || 'Unbekannt';
      await _sb.from('profiles').upsert({ id: user.id, display_name: name });
      window._currentProfile = { id: user.id, display_name: name };
    }

    // Check for pending join code in URL
    var params = new URLSearchParams(window.location.search);
    var jc = params.get('join');

    setMsg('Lade Reisedaten...', '#6a6a66');
    // Load existing trip membership
    var tr = await _sb.from('trip_members')
      .select('trip_id, role, trips(*)')
      .eq('user_id', user.id)
      .order('joined_at', { ascending: true })
      .limit(1).single();

    if (tr.data) {
      _currentTrip = tr.data.trips;
      _currentRole = tr.data.role;
    } else {

      var tripName = window._currentProfile.display_name + 's Reise';

        _currentTrip = nr.data;
        _currentRole = 'owner';
        await _sb.from('trip_members').insert({
          trip_id: nr.data.id, user_id: user.id, role: 'owner'
        });
      }
    }

    // Handle join code from URL
    if (jc && _currentTrip) {
      var jr = await _sb.from('trips').select('id,name,invite_code').eq('invite_code', jc.toUpperCase()).single();
      if (jr.data) {
        var ex = await _sb.from('trip_members').select('id').eq('trip_id', jr.data.id).eq('user_id', user.id).single();
        if (ex.error) {
          await _sb.from('trip_members').insert({ trip_id: jr.data.id, user_id: user.id, role: 'member' });
        }
        _currentTrip = jr.data;
        // Clean URL
        window.history.replaceState({}, '', window.location.pathname);
      }
    }

    // Load members
    var mr = await _sb.from('trip_members')
      .select('user_id, role, profiles(display_name)')
      .eq('trip_id', _currentTrip.id);
    _tripMembers = (mr.data || []).map(function(m) {
      return { user_id: m.user_id, role: m.role, display_name: (m.profiles && m.profiles.display_name) || 'Unbekannt' };
    });
    var me = _tripMembers.find(function(m) { return m.user_id === user.id; });
    if (me) _currentRole = me.role;

    window._currentTrip = _currentTrip;
    window._currentRole = _currentRole;
    window._tripMembers = _tripMembers;
    window._sb = _sb;

    // Sync trip into local trips object
    var tid = _currentTrip.id;
    if (!trips[tid]) {
      trips[tid] = {
        id: tid,
        name: _currentTrip.name,
        persons: _tripMembers.map(function(m) { return m.display_name; }),
        expenses: [],
        packItems: [],
        mapPoints: [],
        mapHighlights: [],
        polls: [],
        notes: [],
        messages: [],
        weatherCity: _currentTrip.weather_city || '',
        dateStart: _currentTrip.date_start || '',
        dateEnd: _currentTrip.date_end || ''
      };
    }
    curId = tid;

    // Patch rDrawer to show user info + invite code
    var _origDrawer = rDrawer;
    window._origDrawer = _origDrawer;
    rDrawer = function() {
      _origDrawer();
      // Inject user info at top of drawer
      var di = document.getElementById('drawer-inner');
      if (!di) return;
      var userPanel = '<div style="padding:10px 12px;background:var(--hov);border-radius:10px;border:1.5px solid var(--bdr);margin-bottom:1.25rem;">' +
        '<div style="font-size:11px;color:var(--cm);">Angemeldet als</div>' +
        '<div style="font-size:14px;font-weight:600;color:var(--ct);margin-top:2px;">' + (window._currentProfile ? window._currentProfile.display_name : '') + '</div>' +
        '<div style="font-size:11px;color:var(--cm);margin-top:1px;">' + (_currentRole === 'owner' ? 'Owner' : 'Mitglied') + '</div>' +
        '<button onclick="doLogout()" style="margin-top:8px;font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--bdr2);background:none;color:var(--cm);cursor:pointer;font-family:DM Sans,sans-serif;">Abmelden</button></div>';
      var invitePanel = _currentRole === 'owner' && _currentTrip ?
        '<div style="margin-bottom:1.25rem;"><div style="font-size:10px;font-weight:600;color:var(--cm);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">Einladung</div>' +
        '<div style="background:var(--hov);border:1.5px dashed var(--bdr2);border-radius:12px;padding:12px;text-align:center;margin-bottom:8px;">' +
        '<div style="font-size:11px;color:var(--cm);margin-bottom:4px;">Einladungscode</div>' +
        '<div style="font-family:DM Mono,monospace;font-size:24px;font-weight:700;color:var(--acc);letter-spacing:.15em;">' + (_currentTrip.invite_code || '') + '</div></div>' +
        '<button onclick="copyInviteLink()" style="width:100%;padding:8px;border-radius:8px;border:1.5px solid var(--bdr2);background:none;color:var(--ct);cursor:pointer;font-family:DM Sans,sans-serif;font-size:13px;">Link kopieren</button></div>' : '';
      di.innerHTML = userPanel + invitePanel + di.innerHTML;
    };

    hideOverlay();
    nav('home');

    // Setup realtime chat
    setupRealtimeChat();
  }

  // ── Realtime chat ──────────────────────────────────────────────────
  function setupRealtimeChat() {
    if (!_currentTrip) return;
    _sb.channel('chat-' + _currentTrip.id)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: 'trip_id=eq.' + _currentTrip.id }, function(payload) {
        var tr2 = trip();
        if (!tr2.messages) tr2.messages = [];
        tr2.messages.push({ id: payload.new.id, type: 'msg', sender: payload.new.sender_name, text: payload.new.content, time: new Date(payload.new.sent_at).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) });
        // Refresh chat if open
        var ov = document.getElementById('chat-overlay');
        if (ov && ov.style.display === 'flex') openChatOverlay();
      }).subscribe();
  }

  // ── Auth actions ───────────────────────────────────────────────────
  window.doLogin = async function() {
    var email = (document.getElementById('auth-email') || {}).value.trim();
    var pw = (document.getElementById('auth-pw') || {}).value;
    if (!email || !pw) { setMsg('Bitte E-Mail und Passwort eingeben.', '#dc2626'); return; }
    setMsg('Anmelden...', '#6a6a66');
    try {
      var r = await _sb.auth.signInWithPassword({ email: email, password: pw });
      if (r.error) {
        setMsg('Fehler: ' + r.error.message, '#dc2626');
        return;
      }
      if (!r.data || !r.data.session) {
        setMsg('Fehler: Keine Session erhalten. Bitte E-Mail bestaetigt?', '#dc2626');
        return;
      }
      setMsg('Erfolgreich! Lade App...', '#16a34a');
    } catch(e) {
      setMsg('Fehler: ' + e.message, '#dc2626');
    }
  };

  window.doRegister = async function() {
    var name = (document.getElementById('auth-name') || {}).value.trim();
    var email = (document.getElementById('auth-reg-email') || {}).value.trim();
    var pw = (document.getElementById('auth-reg-pw') || {}).value;
    if (!name || !email || !pw) { setMsg('Bitte alle Felder ausfüllen.', '#dc2626'); return; }
    if (pw.length < 6) { setMsg('Passwort mindestens 6 Zeichen.', '#dc2626'); return; }
    setMsg('Konto wird erstellt...', '#6a6a66');
    var r = await _sb.auth.signUp({ email: email, password: pw, options: { data: { display_name: name } } });
    if (r.error) { setMsg(r.error.message, '#dc2626'); return; }
    if (r.data && r.data.user && !r.data.session) {
      setMsg('Bitte E-Mail bestätigen um fortzufahren!', '#16a34a');
    }
  };

  window.doJoin = async function() {
    var code = (document.getElementById('join-code') || {}).value.trim().toUpperCase();
    var jmsg = document.getElementById('join-msg');
    if (!code || code.length !== 6) { if (jmsg) jmsg.textContent = 'Bitte 6-stelligen Code eingeben.'; return; }
    if (!_currentUser) { if (jmsg) jmsg.textContent = 'Bitte zuerst anmelden.'; return; }
    if (jmsg) jmsg.textContent = 'Suche Reise...';
    var r = await _sb.from('trips').select('id,name,invite_code').eq('invite_code', code).single();
    if (r.error || !r.data) { if (jmsg) jmsg.textContent = 'Code nicht gefunden.'; return; }
    var ex = await _sb.from('trip_members').select('id').eq('trip_id', r.data.id).eq('user_id', _currentUser.id).single();
    if (!ex.error && ex.data) {
      if (jmsg) jmsg.textContent = 'Du bist bereits Mitglied!';
      _currentTrip = r.data;
      setTimeout(function() { bootApp(_currentUser); }, 800);
      return;
    }
    var jr = await _sb.from('trip_members').insert({ trip_id: r.data.id, user_id: _currentUser.id, role: 'member' });
    if (jr.error) { if (jmsg) jmsg.textContent = 'Fehler: ' + jr.error.message; return; }
    _currentTrip = r.data;
    if (jmsg) jmsg.textContent = 'Erfolgreich beigetreten!';
    setTimeout(function() { bootApp(_currentUser); }, 800);
  };

  window.doLogout = async function() {
    await _sb.auth.signOut();
    _currentUser = null;
    var ov = document.getElementById('trippy-auth-overlay');
    if (ov) ov.style.display = 'flex';
    var app = document.getElementById('app');
    if (app) app.style.display = 'none';
    var fab = document.getElementById('chat-fab');
    if (fab) fab.style.display = 'none';
  };

  window.copyInviteLink = function() {
    if (!_currentTrip) return;
    var link = window.location.origin + window.location.pathname + '?join=' + _currentTrip.invite_code;
    navigator.clipboard.writeText(link).then(function() {
      showToast('Einladungslink kopiert!', 'success');
    }).catch(function() {
      showToast('Code: ' + _currentTrip.invite_code, 'info');
    });
  };

  // ── Start ──────────────────────────────────────────────────────────
  waitForSupabase(function() {
    _sb = supabase.createClient('https://pddmtebaohtcxvuadozm.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkZG10ZWJhb2h0Y3h2dWFkb3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDY0NDUsImV4cCI6MjA5NTE4MjQ0NX0.XwIFcoFoNoVq7mRo7VJ4O-5YM_p9AhuDuhn1eeo0ONc');
    window._sb = _sb;

    _sb.auth.onAuthStateChange(function(event, session) {
      if (session && session.user) {
        _currentUser = session.user;
        bootApp(session.user);
      } else {
        _currentUser = null;
        var ov = document.getElementById('trippy-auth-overlay');
        if (ov) ov.style.display = 'flex';
        var app = document.getElementById('app');
        if (app) app.style.display = 'none';
      }
    });

    // Check for join code in URL on load
    var params = new URLSearchParams(window.location.search);
    if (params.get('join')) {
      authTab('join');
      var jc2 = document.getElementById('join-code');
      if (jc2) jc2.value = params.get('join').toUpperCase();
    }
  });
})();
</script>
